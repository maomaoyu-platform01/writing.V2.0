document.addEventListener('DOMContentLoaded', async function() {

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

ze:29px;font-weight:700;margin:0;letter-spacing:.5px;\n  display:flex;align-items:center;gap:2px}\n.brand h1 .ver{font-family:var(--sans);font-size:17px;font-weight:600;color:#fff;\n  background:var(--seal);padding:2px 7px;border-radius:6px;letter-spacing:.5px;\n  margin-left:-3px;\n  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2)}\n.brand .sub{font-size:10px;color:var(--ink-soft);letter-spacing:1px;line-height:1.35}\n.brand .sub-by{font-size:12px}\n.brand .sub-name{font-size:12px;font-weight:600;color:var(--ink)}\n.topbar .spacer{flex:1}\n.tbtn{\n  border:1px solid var(--line-strong);background:var(--paper);\n  color:var(--ink);padding:7px 13px;border-radius:8px;font-size:13px;\n  display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap;\n}\n.tbtn:hover{background:#fff;border-color:var(--ink-soft);box-shadow:0 1px 3px rgba(40,30,15,.08)}\n.tbtn:active{transform:translateY(1px)}\n.tbtn.primary{background:var(--seal);color:#fff;border-color:var(--seal-deep);font-weight:600}\n.tbtn.primary:hover{background:var(--seal-deep);box-shadow:0 2px 8px rgba(196,69,47,.3)}\n.tbtn.ghost{border-color:transparent;background:transparent}\n.tbtn.ghost:hover{background:rgba(0,0,0,.05)}\n\n/* toolbar grouping: cluster related actions, separate groups with a divider */\n.topbar{gap:10px}\n.toolgroup{display:inline-flex;align-items:center;gap:6px;padding-right:10px;\n  border-right:1px solid var(--line);}\n.toolgroup:last-of-type{border-right:none;padding-right:0}\n.tbtn.icon-btn{padding:7px 10px;font-size:15px}\n\n/* progress pill */\n.progress{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft)}\n.progress .bar{width:120px;height:7px;border-radius:4px;background:var(--paper-2);\n  border:1px solid var(--line-strong);overflow:hidden}\n.progress .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--jade),var(--gold));transition:width .3s}\n\n/* main split */\nmain{flex:1;display:flex;min-height:0}\n.sidebar{\n  width:300px;flex:0 0 300px;border-right:1px solid var(--line-strong);\n  display:flex;flex-direction:column;background:var(--paper-2);min-height:0;\n}\n.tier-tabs{display:flex;padding:10px 10px 0;gap:4px}\n.tier-tabs button{\n  flex:1;border:1px solid var(--line-strong);border-bottom:none;\n  background:var(--paper);padding:8px 4px;border-radius:8px 8px 0 0;font-size:12px;color:var(--ink-soft)\n}\n.tier-tabs button.active{background:var(--paper-2);color:var(--ink);font-weight:600;box-shadow:0 -2px 0 var(--seal) inset}\n.tier-meta{padding:6px 14px;font-size:11px;color:var(--ink-soft);border-bottom:1px solid var(--line)}\n\n/* 待寫包 batch selector */\n.batchbar{border-bottom:1px solid var(--line);background:var(--paper)}\n.batchbar-head{display:flex;align-items:center;justify-content:space-between;\n  padding:7px 12px 5px;font-size:12px;font-weight:600;color:var(--ink-soft)}\n.batchbar-head select{font-size:11px;padding:3px 5px;border:1px solid var(--line-strong);\n  border-radius:6px;background:var(--paper-2);color:var(--ink)}\n.batchlist{display:flex;gap:6px;overflow-x:auto;padding:2px 12px 9px;scrollbar-width:thin}\n.batchlist::-webkit-scrollbar{height:5px}\n.batchlist::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:3px}\n.batch{flex:0 0 auto;min-width:58px;border:1px solid var(--line-strong);border-radius:8px;\n  background:var(--paper-2);padding:5px 8px;cursor:pointer;text-align:center;transition:.12s;position:relative}\n.batch:hover{border-color:var(--ink-soft);background:#fff}\n.batch.active{outline:2px solid var(--seal);outline-offset:-2px;background:#fff}\n.batch.full{background:#eef4ef;border-color:var(--jade)}\n.batch .bnum{font-size:12px;font-weight:700;color:var(--ink)}\n.batch .bfrac{font-size:10px;color:var(--ink-soft);margin-top:1px}\n.batch .bmini{height:3px;border-radius:2px;background:var(--line);margin-top:4px;overflow:hidden}\n.batch .bmini i{display:block;height:100%;background:var(--jade);width:0;transition:width .25s}\n.batc -line-strong);\n  border-radius:var(--r);box-shadow:var(--shadow);touch-action:none;\n  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}\n#bgGrid,#inkCanvas{position:absolute;inset:0;border-radius:var(--r)}\n#inkCanvas{cursor:crosshair;touch-action:none;image-rendering:auto}\n.nav-arrows{position:absolute;inset:0;pointer-events:none}\n.nav-arrows button{pointer-events:auto;position:absolute;top:50%;transform:translateY(-50%);\n  width:42px;height:42px;border-radius:50%;border:1px solid var(--line-strong);background:var(--paper);\n  font-size:18px;color:var(--ink-soft);box-shadow:var(--shadow)}\n.nav-arrows .prev{left:18px}.nav-arrows .next{right:18px}\n.nav-arrows button:hover{background:#fff;color:var(--ink)}\n\n.stage-foot{display:flex;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid var(--line);flex-wrap:wrap}\n.brush-ctrl{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft)}\n.brush-ctrl input[type=range]{width:110px;accent-color:var(--seal)}\n.stage-foot .spacer{flex:1}\n\n/* panels / modals */\n.scrim{position:fixed;inset:0;background:rgba(28,24,18,.45);display:none;align-items:center;\n  justify-content:center;z-index:50;padding:20px}\n.scrim.show{display:flex}\n.modal{background:var(--paper);border-radius:14px;box-shadow:var(--shadow);max-width:560px;width:100%;\n  max-height:86vh;overflow-y:auto;border:1px solid var(--line-strong)}\n.modal h2{font-family:var(--serif);margin:0;padding:18px 22px;border-bottom:1px solid var(--line);font-size:18px;\n  display:flex;align-items:center;justify-content:space-between}\n.modal h2 .x{border:none;background:none;font-size:22px;color:var(--ink-soft);line-height:1}\n.modal .body{padding:18px 22px;display:flex;flex-direction:column;gap:16px}\n.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}\n.field .hint{font-size:11px;color:var(--ink-soft);margin-top:4px;line-height:1.5}\n.field input[type=text],.field select{width:100%;padding:9px 25)}\n.guide-btns{display:flex;gap:8px}\n@media (max-width:780px){\n  .guide-stage{padding:30px 22px 20px;min-height:260px}\n  .guide-emoji{font-size:46px}\n  .guide-title{font-size:25px}\n  .guide-body{font-size:17px}\n}\n\n#dropOverlay{position:fixed;inset:0;z-index:95;display:none;align-items:center;justify-content:center;\n  background:rgba(243,237,225,.92);border:4px dashed var(--seal);}\n#dropOverlay.show{display:flex}\n.drop-card{text-align:center;color:var(--ink)}\n\n#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);\n  background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:10px;font-size:13px;\n  opacity:0;transition:.25s;z-index:80;pointer-events:none;box-shadow:var(--shadow)}\n#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n\n@media (max-width:780px){\n  .sidebar{position:absolute;z-index:30;height:100%;transform:translateX(-100%);transition:.25s;box-shadow:var(--shadow)}\n  .sidebar.open{transform:none}\n  .cgrid{grid-template-columns:repeat(5,1fr)}\n  .brand .sub{display:none}\n  .cur-info{display:none}\n}\n.mobile-only{display:none}\n@media (max-width:780px){.mobile-only{display:inline-flex}}\n\n/* ===== 2.0：模式切換與試演 ===== */\n.mode-tabs{display:inline-flex;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;background:var(--paper-2);flex:0 0 auto}\n.mode-tabs button{border:none;background:transparent;padding:8px 16px;font-size:14px;color:var(--ink-soft);display:inline-flex;gap:6px;align-items:center;white-space:nowrap}\n.mode-tabs button:hover{color:var(--ink)}\n.mode-tabs button.on{background:var(--ink);color:var(--paper);font-weight:600}\n#tryonWrap{display:none;flex:1;min-height:0;position:relative}\n#tryonWrap iframe{width:100%;height:100%;border:none;display:block}\nbody.mode-tryon #tryonWrap{display:block}\nbody.mode-tryon main{display:none}\nbody.mode-tryon .topbar .toolgroup,body.mode-tryon .topbar .progress,body.mode-tryon #exportBtn{display:none}\n.remi a,var(--paper));border:1px solid var(--line-strong);\n  border-radius:18px;max-width:480px;width:100%;padding:40px 44px 26px;\n  box-shadow:0 2px 6px rgba(40,30,15,.12),0 34px 90px rgba(28,24,18,.45);\n  display:flex;flex-direction:column;gap:18px;overflow:hidden}\n.setup-card::before{content:\"\";position:absolute;inset:10px;border:1px solid rgba(196,69,47,.28);border-radius:12px;pointer-events:none}\n.setup-seal{width:58px;height:58px;border-radius:10px;background:linear-gradient(180deg,#d4573c,var(--seal-deep));\n  color:#fff;font-family:var(--serif);font-size:34px;font-weight:700;display:grid;place-items:center;align-self:center;\n  box-shadow:0 3px 12px rgba(196,69,47,.4),inset 0 1px 0 rgba(255,255,255,.3)}\n.setup-title{font-family:var(--serif);font-size:29px;font-weight:700;text-align:center;letter-spacing:3px;color:var(--ink)}\n.setup-sub{font-size:14px;color:var(--ink-soft);text-align:center;margin-top:7px;letter-spacing:1.5px}\n.su-field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}\n.su-field input{width:100%;padding:11px 13px;border:1px solid var(--line-strong);border-radius:9px;\n  background:linear-gradient(180deg,#fff,#fdfaf3);font-size:15px;outline:none;box-shadow:inset 0 1px 3px rgba(40,30,15,.06)}\n.su-field input:focus{border-color:var(--seal);box-shadow:inset 0 1px 3px rgba(40,30,15,.06),0 0 0 3px rgba(196,69,47,.12)}\n.su-hint{font-size:11px;color:var(--ink-soft);margin-top:4px;line-height:1.5}\n.setup-fields{display:flex;flex-direction:column;gap:14px}\n.setup-preview{display:flex;align-items:baseline;justify-content:center;gap:12px;padding:13px 16px;min-height:56px;\n  background:linear-gradient(180deg,#fff,#fbf5ea);border:1px dashed var(--line-strong);border-radius:10px}\n.spv-zh{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--ink)}\n.spv-en{font-family:var(--mono);font-size:12px;color:var(--seal-deep)}\n.setup-go{justify-content:center;font-size:16px;padding:13px}\n.setup-note{font-size:11px;color:var(--ink-soft);text-align:center;letter-spacing:.5px}\n.device-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}\n.device-pick button{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;\n  border:1px solid var(--line-strong);border-radius:10px;background:linear-gradient(180deg,#fff,#fdfaf3);\n  font-size:13px;color:var(--ink-soft);box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 1px 3px rgba(40,30,15,.08);transition:.15s}\n.device-pick button i{font-style:normal;font-size:22px;line-height:1}\n.device-pick button:hover{transform:translateY(-1px)}\n.device-pick button.on{border-color:var(--seal);color:var(--ink);background:#fff;\n  box-shadow:0 0 0 2px rgba(196,69,47,.18),0 3px 10px rgba(196,69,47,.15)}\n/* ===== 2.0 響應式：桌機 / 平板 / 手機 ===== */\n.sidebar{position:relative;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}\n.sb-collapse{position:absolute;top:50%;right:-15px;transform:translateY(-50%);width:28px;height:60px;\n  border:1px solid var(--line-strong);border-left:none;border-radius:0 10px 10px 0;\n  background:linear-gradient(180deg,#fdfaf3,var(--paper));color:var(--ink-soft);cursor:pointer;z-index:31;\n  display:flex;align-items:center;justify-content:center;font-size:14px;padding:0;\n  box-shadow:3px 0 10px rgba(40,30,15,.12)}\n.sb-collapse:hover{color:var(--seal);background:#fff}\n.app.sb-closed .sidebar{margin-left:-300px}\n.app.sb-closed .sb-collapse{right:-30px}\n#sbBackdrop{position:fixed;inset:0;background:rgba(28,24,18,.42);z-index:59;opacity:0;pointer-events:none;transition:opacity .3s}\n#sbBackdrop.show{opacity:1;pointer-events:auto}\n.sb-mobile-head{display:none;align-items:center;justify-content:space-between;padding:12px 14px;\n  border-bottom:1px solid var(--line);background:var(--paper)}\n.sb-mobile-head .smh-title{font-family:var(--serif);font-weight:700;font-size:16px;letter-spacing:1px}\n\n/* -- 平板（781–1150px）：窄側欄、精簡頂欄 -- */\n@media (min-width:781px) and (max-width:1150px){\n  .sidebar{width:262px;flex-basis:262px}\n  .app.sb-closed .sidebar{margin-left:-262px}\n  .brand .sub{display:none}\n  .cur-info{display:none}\n  header.topbar{padding:8px 12px;gap:8px}\n  .tbtn{padding:7px 10px;font-size:12px}\n  .progress .bar{width:80px}\n  .cgrid{grid-template-columns:repeat(5,1fr)}\n}\n\n/* -- 手機（≤780px）：抽屜式字表＋遮罩，精簡控制列 -- */\n@media (max-width:780px){\n  .sb-collapse{display:none}\n  .sb-mobile-head{display:flex}\n  .sidebar{position:fixed;left:0;top:0;bottom:0;height:auto;z-index:60;width:min(320px,86vw);\n    margin-left:0 !important;transform:translateX(-105%);transition:transform .3s cubic-bezier(.4,0,.2,1);\n    box-shadow:14px 0 44px rgba(28,24,18,.28)}\n  .sidebar.open{transform:none}\n  header.topbar{flex-wrap:wrap;row-gap:6px;padding:8px 10px;gap:8px}\n  .tbtn{font-size:12px;padding:6px 9px}\n  .progress{order:9;flex-basis:100%;justify-content:center}\n  .progress .bar{flex:1;max-width:none}\n  .stage-head{flex-wrap:wrap;gap:8px;padding:10px 12px}\n  .stage-foot{gap:8px;padding:10px 12px}\n  .canvas-area{padding:10px}\n  .nav-arrows .prev{left:6px}.nav-arrows .next{right:6px}\n  .nav-arrows button{width:38px;height:38px}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n  <header class=\"topbar\">\n    <button class=\"tbtn ghost mobile-only\" id=\"menuBtn\">☰<\u002Fbutton>\n    <div class=\"brand\">\n      <div>\n        <h1>墨格 <span class=\"ver\">V2.0<\u002Fspan><\u002Fh1>\n        <div class=\"sub\"><span class=\"sub-by\">Design by<\u002Fspan><br><span class=\"sub-name\">毛毛雨的晴天<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <nav class=\"mode-tabs\" id=\"modeTabs\" title=\"切換模式\">\n      <button class=\"on\" data-mode=\"write\">✍ 創作<\u002Fbutton>\n      <button data-mode=\"tryon\">👁 試演<\u002Fbutton>\n    <\u002Fnav>\n    <div class=\"spacer\"><\u002Fdiv>\n    <div class=\"progress\" title=\"已書寫字數\">\n      <div class=\"bar\"><i id=\"progBar\"><\u002Fi><\u002Fdiv>\n      <span id=\"progTxt\">0 / 0<\u002Fspan>\n    <\u002Fdiv>\n v class=\"batchlist\" id=\"batchlist\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"charsearch\"><input id=\"charSearch\" placeholder=\"跳到某字 / 輸入要找的字…\" maxlength=\"2\"><\u002Fdiv>\n      <div class=\"gridwrap\"><div class=\"cgrid\" id=\"cgrid\"><\u002Fdiv><\u002Fdiv>\n      <button class=\"sb-collapse\" id=\"sbCollapse\" title=\"收合字表\">❬<\u002Fbutton>\n    <\u002Faside>\n\n    <section class=\"stage\">\n      <div class=\"stage-head\">\n        <div class=\"cur-char\" id=\"curChar\">永<\u002Fdiv>\n        <div class=\"cur-info\" id=\"curInfo\"><\u002Fdiv>\n        <div class=\"spacer\"><\u002Fdiv>\n        <button class=\"tool on\" id=\"penTool\" title=\"筆 (P)\">✒ 筆<\u002Fbutton>\n        <button class=\"tool\" id=\"eraseTool\" title=\"橡皮擦 (E)\">⌫ 擦<\u002Fbutton>\n        <button class=\"tool\" id=\"undoBtn\" title=\"復原 (Ctrl+Z)\" disabled=\"\">↶<\u002Fbutton>\n        <button class=\"tool\" id=\"redoBtn\" title=\"重做 (Ctrl+Y)\" disabled=\"\">↷<\u002Fbutton>\n        <button class=\"tool\" id=\"clearBtn\" title=\"清空此字\">🗑 清空<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"canvas-area\">\n        <div class=\"canvas-box\" id=\"canvasBox\">\n          <canvas id=\"bgGrid\"><\u002Fcanvas>\n          <canvas id=\"inkCanvas\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div class=\"nav-arrows\">\n          <button class=\"prev\" id=\"prevChar\">‹<\u002Fbutton>\n          <button class=\"next\" id=\"nextChar\">›<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"stage-foot\">\n        <div class=\"brush-ctrl\">筆觸\n          <select id=\"penType\" style=\"padding:4px 6px;border-radius:6px;border:1px solid var(--line-strong)\">\n            <option value=\"brush\">🖌 毛筆<\u002Foption>\n            <option value=\"pen\">✒ 鋼筆<\u002Foption>\n            <option value=\"pencil\">✏ 鉛筆<\u002Foption>\n            <option value=\"marker\">🖍 麥克筆<\u002Foption>\n            <option value=\"dry\">🌬 枯筆（飛白）<\u002Foption>\n          <\u002Fselect>\n ss=\"field\">\n        <label>書寫方向優化<\u002Flabel>\n        <div class=\"seg\" id=\"alignSeg\">\n          <button data-a=\"h\">⮕ 橫排<\u002Fbutton>\n          <button data-a=\"v\">⬇ 直排<\u002Fbutton>\n          <button data-a=\"off\">原樣不校正<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"hint\" id=\"alignHint\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"note\">自動校正只會「平移」每個漢字的墨跡位置，修正手寫時的偏移；筆形本身不會被改動，標點與英數字也維持原樣。<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot\">\n      <button class=\"tbtn\" data-close=\"\">取消<\u002Fbutton>\n      <button class=\"tbtn primary\" id=\"alignGo\">開始產生 →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Export progress modal -->\n<div class=\"scrim\" id=\"expScrim\">\n  <div class=\"modal\" style=\"max-width:420px\">\n    <h2>產生字型中… <button class=\"x\" data-close=\"\" id=\"expClose\" style=\"display:none\">×<\u002Fbutton><\u002Fh2>\n    <div class=\"body\">\n      <div class=\"progress\"><div class=\"bar\" style=\"width:100%\"><i id=\"expBar\"><\u002Fi><\u002Fdiv><\u002Fdiv>\n      <div id=\"expStatus\" style=\"font-size:13px;color:var(--ink-soft)\">準備中…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Live preview modal -->\n<div class=\"scrim\" id=\"pvScrim\">\n  <div class=\"modal\" style=\"max-width:680px\">\n    <h2>字體預覽 <button class=\"x\" data-close=\"\">×<\u002Fbutton><\u002Fh2>\n    <div class=\"body\">\n      <div class=\"pv-controls\">\n        <input type=\"text\" id=\"pvInput\" placeholder=\"永和九年歲在癸丑 — 在此輸入文字試打你的手寫字\">\n        <div class=\"pv-row\">\n          <label class=\"pv-range\">大小\n            <input type=\"range\" id=\"pvSize\" min=\"24\" max=\"120\" value=\"56\">\n            <span id=\"pvSizeVal\">56px<\u002Fspan>\n          <\u002Flabel>\n          <label class=\"pv-check\"><input type=\"checkbox\" id=\"pvVert\"> 直排<\u002Flabel>\n          <div class=\"pv-presets\">\n            <button data-t=\"天地玄黃宇宙洪荒\">千字文<\u002Fbutton>\n            <button data-t=\"0123456789AB n\n  // OS/2\n  {\n    const w=new Writer();\n    w.u16(4);                 // version\n    w.i16(Math.round(UPM*0.5)); // xAvgCharWidth (approx)\n    w.u16(400);               // usWeightClass\n    w.u16(5);                 // usWidthClass\n    w.u16(0);                 // fsType\n    // subscript/superscript/strikeout (8 i16)\n    const sub=Math.round(UPM*0.65);\n    w.i16(Math.round(UPM*0.65)); w.i16(Math.round(UPM*0.7));\n    w.i16(0); w.i16(Math.round(UPM*0.14));\n    w.i16(Math.round(UPM*0.65)); w.i16(Math.round(UPM*0.7));\n    w.i16(0); w.i16(Math.round(UPM*0.48));\n    w.i16(Math.round(UPM*0.5)); w.i16(Math.round(UPM*0.26)); // yStrikeoutSize/Position\n    w.i16(0);                 // sFamilyClass\n    // panose (10 bytes) — all zero = any\n    for(let i=0;i<10;i++) w.u8(0);\n    // unicode ranges (4x u32) — set basic + CJK bits broadly\n    w.u32(0xE0000000>>>0); w.u32(0x00000000); w.u32(0x00000000); w.u32(0x00000000);\n    w.tag('MGEH');            // achVendID\n    w.u16(0x0040);            // fsSelection: REGULAR\n    // first/last char\n    let minU=0xFFFF,maxU=0;\n    for(const e of cmapEntries){ if(e.unicode<=0xFFFF){ if(e.unicode<minU)minU=e.unicode; if(e.unicode>maxU)maxU=e.unicode; } }\n    if(minU>maxU){ minU=0; maxU=0; }\n    w.u16(minU); w.u16(maxU);\n    w.i16(ascender);          // sTypoAscender\n    w.i16(descender);         // sTypoDescender\n    w.i16(Math.round(UPM*0.09)); // sTypoLineGap\n    w.u16(ascender);          // usWinAscent\n    w.u16(Math.abs(descender)); // usWinDescent\n    w.u32(1); w.u32(0);       // ulCodePageRange1/2 (Latin1)\n    w.i16(Math.round(UPM*0.5)); // sxHeight\n    w.i16(Math.round(UPM*0.7)); // sCapHeight\n    w.u16(0);                 // usDefaultChar\n    w.u16(0x20);              // usBreakChar (space)\n    w.u16(2);                 // usMaxContext\n    tables['OS/2']=w.b;\n  }\n\n  // post (version 3.0 — no glyph names)\n  {\n    const w=new Writer();\n    w.u32(0x00030000);\n    w.u32(0);                 // ToContours };\n})();\n\n<\u002Fscript>\n<script>\n/* app.js — 墨格 handwriting foundry main logic */\n(function(){\n'use strict';\nconst $ = s=>document.querySelector(s);\nconst $$ = s=>[...document.querySelectorAll(s)];\nconst UPM = 1000;            // units per em\nconst CANVAS_PX = 512;       // glyph canvas internal resolution (higher = crisper ink & smoother trace)\n\n// ---------- state ----------\nconst state = {\n  tier:'common',\n  index:0,                   // index within current tier list\n  settings:{ enName:'MyHandwriting', zhName:'我的手寫體', scale:100,\n             width:'mono', fmt:'otf', grid:'mi', brush:14, pressure:true, batchSize:100, pen:'brush', align:'h' },\n  tool:'pen',\n  batchSize:100,        // hanzi per writing-pack (min 50)\n  batch:0,              // active batch index\n};\nlet curList = [];            // full chars of current tier\nlet viewList = [];           // chars currently shown (a batch slice or all)\nlet viewOffset = 0;          // index offset of viewList within curList\n\n// ---------- IndexedDB ----------\nconst DB='mogeh_db', STORE='glyphs', META='meta';\nlet db;\nfunction openDB(){\n  return new Promise((res,rej)=>{\n    const r=indexedDB.open(DB,1);\n    r.onupgradeneeded=e=>{\n      const d=e.target.result;\n      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE);\n      if(!d.objectStoreNames.contains(META)) d.createObjectStore(META);\n    };\n    r.onsuccess=e=>{db=e.target.result;res();};\n    r.onerror=e=>rej(e);\n  });\n}\nfunction idbGet(store,key){return new Promise((res,rej)=>{\n  if(!db) return res(undefined);\n  try{ const t=db.transaction(store).objectStore(store).get(key);\n    t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error); }catch(e){ rej(e); }});}\nfunction idbPut(store,key,val){return new Promise((res,rej)=>{\n  if(!db) return rej(new Error('no-storage'));\n  try{ const t=db.transaction(store,'readwrite').objectStore(store).put(val,key);\n    t.onsuccess=()=>res();t.onerror=()=>rej(t.error); }catch(e){ rej(e); }});}\nfunction idbDel(store,key){return new Promise((res)=>{\n  if(!db) return res();\n  try{ const t=db.transaction(store,'readwrite').objectStore(store).delete(key);\n    t.onsuccess=()=>res();t.onerror=()=>res(); }catch(e){ res(); }});}\nfunction idbKeys(store){return new Promise((res)=>{\n  if(!db) return res([]);\n  try{ const t=db.transaction(store).objectStore(store).getAllKeys();\n    t.onsuccess=()=>res(t.result);t.onerror=()=>res([]); }catch(e){ res([]); }});}\nfunction idbClear(store){return new Promise(res=>{\n  if(!db) return res();\n  try{ const t=db.transaction(store,'readwrite').objectStore(store).clear();\n    t.onsuccess=()=>res();t.onerror=()=>res(); }catch(e){ res(); }});}\n\n// glyph key by codepoint so it's shared across tiers\nconst keyOf = ch => 'u'+ch.codePointAt(0).toString(16);\n\n// in-memory set of which codepoints have glyphs (for grid status)\nconst written = new Set();\n\n// ---------- toast ----------\nlet toastT;\nfunction toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');\n  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}\n\n// ---------- character grid ----------\nfunction loadTier(tier){\n  state.tier=tier;\n  let list=[...window.CHARSETS.ascii + window.CHARSETS[tier]];\n  // de-dup keeping order\n  const seen=new Set(); list=list.filter(c=>!seen.has(c)&&seen.add(c));\n  // Reorder the leading non-hanzi block so 數字+英文 come first, then 符號.\n  // (Order only affects display/batching; the font is keyed by codepoint.)\n  const lead=[], rest=[];\n  let inLead=true;\n  for(const c of list){\n    if(inLead && !isHanzi(c)) lead.push(c);\n    else { inLead=false; rest.push(c); }\n  }\n  const alnum=lead.filter(c=>isAlnum(c));\n  const syms=lead.filter(c=>!isAlnum(c));\n  curList=[...alnum, ...syms, ...rest];\n  state.leadAlnum=alnum.length;          // boundary: end of 數字英文 pack\n  state.leadSyms=syms.length;            // count of 符號 pack\n  $('#tierMeta').textContent =\n    ({common:'常用字 · ',big5:'BIG5 常用字 · ',full:'完整 CJK 基本區 · '}[tier])\n    + curList.length.toLocaleString() + ' 字（含半形英數）';\n  $$('.tier-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tier===tier));\n  state.batch=0;\n  buildBatchBounds();\n  renderBatches();\n  applyBatch();          // sets viewList + offset, renders grid\n  selectGlobal(viewOffset);\n}\n// numbers + English letters (the 數字·英文 pack)\nfunction isAlnum(ch){ return /[0-9A-Za-z]/.test(ch); }\n\n// A character is a real CJK ideograph (hanzi) only within the ideograph\n// ranges. Fullwidth/CJK punctuation (，。「」？！ etc., in U+3000–303F and\n// U+FF00–FFEF) are symbols and belong in the first pack with numbers/English.\nfunction isHanzi(ch){\n  const cp=ch.codePointAt(0);\n  return (cp>=0x3400 && cp<=0x4DBF)   // CJK Ext-A\n      || (cp>=0x4E00 && cp<=0x9FFF)   // CJK Unified Ideographs\n      || (cp>=0xF900 && cp<=0xFAFF);  // CJK Compatibility Ideographs\n}\n\n// batchBounds: array of [start,end,label] pairs describing each writing-pack.\n// Pack order: 數字·英文 → 符號 → 200 hanzi per pack.\nlet batchBounds=[];\nfunction buildBatchBounds(){\n  batchBounds=[];\n  const N=curList.length;\n  if(!state.batchSize){ batchBounds=[[0,N,'全部']]; return; }\n  const a=state.leadAlnum||0;            // [0,a) = 數字·英文\n  const s=state.leadSyms||0;             // [a,a+s) = 符號\n  if(a>0) batchBounds.push([0,a,'數字·英文']);\n  if(s>0) batchBounds.push([a,a+s,'符號']);\n  // remaining hanzi in chunks of batchSize\n  let p=a+s;\n  while(p<N){\n    const e=Math.min(N, p+state.batchSize);\n    batchBounds.push([p,e,null]);\n    p=e;\n  }\n  if(!batchBounds.length) batchBounds=[[0,N,'全部']];\n}\n\n// how many batches in current tier\nfunction batchCount(){ return batchBounds.length; }\n// which pack contains global index gi\nfunction batchOf(gi){\n  for(let b=0;b<batchBounds.length;b++){\n    if(gi>=batchBounds[b][0] && gi<batchBounds[b][1]) return b;\n  }\n  return 0;\n}\n// written count within a global index range [s,e)\nfunction writtenInRange(s,e){\n  let n=0; for(let i=s;i<e;i++) if(written.has(curList[i].codePointAt(0))) n++; return n;\n}\nfunction renderBatches(){\n  const bar=$('#batchbar'), list=$('#batchlist');\n  if(!state.batchSize){ bar.style.display='none'; return; }\n  bar.style.display='';\n  list.innerHTML='';\n  const frag=document.createDocumentFragment();\n  // running hanzi-pack counter so labels read 第1包/第2包 for hanzi groups\n  let hanziNo=0;\n  for(let b=0;b<batchBounds.length;b++){\n    const [s,e,label]=batchBounds[b];\n    const size=e-s, done=writtenInRange(s,e);\n    const el=document.createElement('div');\n    el.className='batch'+(b===state.batch?' active':'')+(done===size&&size>0?' full':'');\n    let title;\n    if(label){ title=label; }\n    else { hanziNo++; title='第'+hanziNo+'包'; }\n    el.innerHTML=`<div class=\"bnum\">${title}<\u002Fdiv>\n      <div class=\"bfrac\">${done}/${size}<\u002Fdiv>\n      <div class=\"bmini\"><i style=\"width:${size?100*done/size:0}%\"><\u002Fi><\u002Fdiv>`;\n    el.title=`${title}：${curList[s]}…${curList[e-1]}（${done}/${size} 已寫）`;\n    el.onclick=()=>{ state.batch=b; renderBatches(); applyBatch(); selectGlobal(batchBounds[b][0]); };\n    frag.appendChild(el);\n  }\n  list.appendChild(frag);\n  // scroll active into view\n  const act=list.querySelector('.batch.active'); if(act) act.scrollIntoView({inline:'center',block:'nearest'});\n}\n// lightweight: patch only the active batch node (called on every save)\nfunction updateActiveBatch(){\n  if(!state.batchSize) return;\n  const list=$('#batchlist');\n  const el=list&&list.querySelector('.batch.active');\n  if(!el){ renderBatches(); return; }\n  const [s,e]=batchBounds[state.batch];\n  const size=e-s, done=writtenInRange(s,e);\n  const frac=el.querySelector('.bfrac'); if(frac) frac.textContent=`${done}/${size}`;\n  const bar=el.querySelector('.bmini i'); if(bar) bar.style.width=(size?100*done/size:0)+'%';\n  el.classList.toggle('full', done===size && size>0);\n}\n// set viewList to the active batch slice\nfunction applyBatch(){\n  if(!state.batchSize){ viewList=curList; viewOffset=0; }\n  else{\n    const [s,e]=batchBounds[state.batch]||[0,curList.length];\n    viewList=curList.slice(s,e); viewOffset=s;\n  }\n  renderGrid();\n}\n\nlet gridStart=0;\nfunction renderGrid(){\n  const grid=$('#cgrid');\n  // viewList is the active batch (≤500) or full tier when unbatched.\n  // For unbatched large tiers, virtualize a window around current index.\n  let lo=0, hi=viewList.length;\n  if(!state.batchSize && viewList.length>400){\n    const localIdx=state.index-viewOffset;\n    lo=Math.max(0, localIdx-60); hi=Math.min(viewList.length, lo+300);\n  }\n  gridStart=viewOffset+lo;\n  grid.innerHTML='';\n  const frag=document.createDocumentFragment();\n  for(let i=lo;i<hi;i++){\n    const gi=viewOffset+i;             // global index\n    const ch=viewList[i];\n    const cell=document.createElement('div');\n    cell.className='cell'+(ch.charCodeAt(0)<128?' ascii':'');\n    cell.textContent=ch;\n    cell.dataset.gi=gi;\n    if(written.has(ch.codePointAt(0))) cell.classList.add('done');\n    if(gi===state.index) cell.classList.add('active');\n    cell.onclick=()=>selectGlobal(gi);\n    frag.appendChild(cell);\n  }\n  grid.appendChild(frag);\n  updateProgress();\n}\nfunction refreshCellStatus(ch){\n  const cp=ch.codePointAt(0);\n  $$('.cell').forEach(c=>{ if(curList[+c.dataset.gi]===ch)\n    c.classList.toggle('done',written.has(cp)); });\n}\n\nfunction batchLabel(b){\n  if(!batchBounds.length) return '全部';\n  const lab=batchBounds[b] && batchBounds[b][2];\n  if(lab) return lab;\n  // count hanzi packs up to b\n  let hn=0; for(let i=0;i<=b;i++){ if(!batchBounds[i][2]) hn++; }\n  return '第'+hn+'包';\n}\nfunction updateProgress(){\n  // progress reflects the current scope: batch if batched, else whole tier\n  let scopeList, label;\n  if(state.batchSize){ scopeList=viewList; label=batchLabel(state.batch); }\n  else { scopeList=curList; label='全部'; }\n  let n=0; for(const ch of scopeList) if(written.has(ch.codePointAt(0))) n++;\n  const total=scopeList.length;\n  $('#progTxt').textContent=`${label} ${n}/${total}`;\n  $('#progBar').style.width=(total?100*n/total:0)+'%';\n}\n\n// ---------- select / load glyph (global index into curList) ----------\nasync function selectGlobal(gi){\n  if(gi<0||gi>=curList.length) return;\n  await saveCurrentIfDirty();\n  state.index=gi;\n  // if gi falls outside the active batch, switch batch to contain it\n  if(state.batchSize){\n    const b=batchOf(gi);\n    if(b!==state.batch){ state.batch=b; applyBatch(); renderBatches(); }\n  }\n  const ch=curList[gi];\n  $('#curChar').textContent=ch;\n  drawGrid();  // 更新格內參考字\n  const cp=ch.codePointAt(0);\n  $('#curInfo').innerHTML=`<b>U+${cp.toString(16).toUpperCase().padStart(4,'0')}<\u002Fb> · 第 ${gi+1} / ${curList.length} 字`;\n  // ensure visible in grid window (unbatched virtualization)\n  if(!state.batchSize && (gi<gridStart||gi>=gridStart+300)) renderGrid();\n  $$('.cell').forEach(c=>c.classList.toggle('active',+c.dataset.gi===gi));\n  await loadGlyphToCanvas(ch);\n  dirty=false;\n}\n// back-compat alias\nconst selectIndex=selectGlobal;\n\nlet dirty=false;\nasync function loadGlyphToCanvas(ch){\n  const ctx=ink.getContext('2d');\n  ctx.clearRect(0,0,ink.width,ink.height);\n  const rec=await idbGet(STORE,keyOf(ch));\n  if(rec && rec.png){\n    const img=new Image();\n    await new Promise(r=>{img.onload=r;img.src=rec.png;});\n    ctx.drawImage(img,0,0,ink.width,ink.height);\n  }\n  resetUndo();\n}\n\n// ---------- canvas drawing ----------\nconst box=$('#canvasBox'), bg=$('#bgGrid'), ink=$('#inkCanvas');\nfunction sizeCanvas(){\n  const sbW = isMobile() ? 36 : (sidebarOpen()? 340 : 60);\n  const dim=Math.min(CANVAS_PX, Math.min(window.innerWidth-sbW, window.innerHeight-260));\n  const d=Math.max(260,dim);\n  box.style.width=d+'px'; box.style.height=d+'px';\n  // bg grid can be re-rendered freely\n  bg.width=CANVAS_PX; bg.height=CANVAS_PX;\n  bg.style.width=d+'px'; bg.style.height=d+'px';\n  // ink: preserve current pixels across a resize (setting .width clears it)\n  if(ink.width!==CANVAS_PX || ink.height!==CANVAS_PX){\n    let saved=null;\n    if(ink.width && ink.height){\n      try{ saved=ink.getContext('2d').getImageData(0,0,ink.width,ink.height); }catch(_){}\n    }\n    ink.width=CANVAS_PX; ink.height=CANVAS_PX;\n    if(saved){\n      const tmp=document.createElement('canvas'); tmp.width=saved.width; tmp.height=saved.height;\n      tmp.getContext('2d').putImageData(saved,0,0);\n      ink.getContext('2d').drawImage(tmp,0,0,CANVAS_PX,CANVAS_PX);\n    }\n  }\n  ink.style.width=d+'px'; ink.style.height=d+'px';\n  drawGrid();\n}\nfunction drawGrid(){\n  const ctx=bg.getContext('2d'),s=CANVAS_PX;\n  ctx.clearRect(0,0,s,s);\n  ctx.fillStyle='#fff';ctx.fillRect(0,0,s,s);\n  ctx.strokeStyle='#e7c9bf'; ctx.lineWidth=1;\n  // outer frame\n  ctx.strokeRect(.5,.5,s-1,s-1);\n  ctx.save();\n  ctx.strokeStyle='#eccfc7'; ctx.setLineDash([5,4]);\n  const g=state.settings.grid;\n  if(g==='nine'){\n    for(let k=1;k<3;k++){ const p=s*k/3;\n      line(ctx,p,0,p,s);line(ctx,0,p,s,p); }\n  }else if(g==='tian'||g==='mi'){\n    line(ctx,s/2,0,s/2,s);line(ctx,0,s/2,s,s/2);\n    if(g==='mi'){ line(ctx,0,0,s,s);line(ctx,s,0,0,s); }\n  }\n  ctx.restore();\n  // 2.0：淡淡的參考字（可關閉）\n  if(state.settings.refChar!==false){\n    const ch=curList&&curList[state.index];\n    if(ch){\n      ctx.save();\n      ctx.fillStyle='rgba(90,80,66,0.10)';\n      ctx.font=(s*0.78)+'px \"Kaiti TC\",\"DFKai-SB\",\"BiauKai\",\"KaiTi\",\"STKaiti\",serif';\n      ctx.textAlign='center'; ctx.textBaseline='middle';\n      ctx.fillText(ch, s/2, s*0.54);\n      ctx.restore();\n    }\n  }\n}\nfunction line(ctx,a,b,c,d){ctx.beginPath();ctx.moveTo(a,b);ctx.lineTo(c,d);ctx.stroke();}\n\nlet drawing=false;\nfunction pos(e){\n  const r=ink.getBoundingClientRect();\n  const sx=ink.width/r.width, sy=ink.height/r.height;\n  return {x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy,\n          p:(e.pressure!=null&&e.pressure>0)?e.pressure:0.5,\n          t:(e.timeStamp||performance.now())};\n}\n// resolution scale so brush feel is consistent regardless of CANVAS_PX\nconst PXSCALE = CANVAS_PX/360;\n\n// ---- 筆觸種類 (2.0) ----\nconst BRUSHES={\n  brush : {label:'毛筆',   scale:1.00, press:1.00, vel:0.10, taperIn:0.60, taperOut:0.85, smooth:0.35, color:'#16140f'},\n  pen   : {label:'鋼筆',   scale:0.80, press:0.25, vel:0.04, taperIn:0.90, taperOut:0.95, smooth:0.55, color:'#16140f'},\n  pencil: {label:'鉛筆',   scale:0.55, press:0.55, vel:0.06, taperIn:0.85, taperOut:0.90, smooth:0.50, color:'#4a443c'},\n  marker: {label:'麥克筆', scale:1.45, press:0.10, vel:0.02, taperIn:1.00, taperOut:1.00, smooth:0.60, color:'#221f1a'},\n  dry   : {label:'枯筆',   scale:1.15, press:1.00, vel:0.14, taperIn:0.55, taperOut:0.80, smooth:0.35, color:'#16140f', streaks:true},\n};\nfunction curBrush(){ return BRUSHES[state.settings.pen]||BRUSHES.brush; }\nfunction targetWidth(p, speed){\n  const B=curBrush();\n  // base from slider, scaled to canvas resolution & brush character\n  let w=state.settings.brush*PXSCALE*B.scale;\n  if(state.settings.pressure && p>0){ w *= Math.max(0.15, 1 + B.press*1.2*(p-0.5)*2); }\n  // velocity thinning: faster strokes get thinner (per-brush strength)\n  const vt = 1 - Math.min(0.35, speed*B.vel);\n  w *= vt;\n  return Math.max(1.0*PXSCALE, w);\n}\n\n// stroke state\nlet strokePts=[];        // {x,y,w} smoothed, already-rendered points\nlet lastRaw=null;        // last raw sample for speed calc\nlet smoothW=0;           // running smoothed width\nconst INK='#16140f';\nfunction drawDot(ctx,x,y,w){ctx.beginPath();ctx.arc(x,y,w/2,0,7);ctx.fill();}\n\n// render one continuous segment as a filled ribbon (trapezoid + end cap)\nfunction ribbon(ctx, a, b){\n  const B=curBrush();\n  if(B.streaks && state.tool!=='erase'){\n    // 枯筆：三條留隙細帶，模擬乾墨飛白\n    const dx=b.x-a.x, dy=b.y-a.y, l=Math.hypot(dx,dy)||1e-6;\n    const nx=-dy/l, ny=dx/l;\n    const off=[-0.32,0.06,0.40], wf=[0.42,0.34,0.30];\n    for(let i=0;i<3;i++){\n      ribbonSolid(ctx,\n        {x:a.x+nx*a.w*off[i], y:a.y+ny*a.w*off[i], w:a.w*wf[i]},\n        {x:b.x+nx*b.w*off[i], y:b.y+ny*b.w*off[i], w:b.w*wf[i]});\n    }\n    return;\n  }\n  ribbonSolid(ctx,a,b);\n}\nfunction ribbonSolid(ctx, a, b){\n  const dx=b.x-a.x, dy=b.y-a.y;\n  const len=Math.hypot(dx,dy)||1e-6;\n  const nx=-dy/len, ny=dx/len;           // unit normal\n  const ar=a.w/2, br=b.w/2;\n  ctx.beginPath();\n  ctx.moveTo(a.x+nx*ar, a.y+ny*ar);\n  ctx.lineTo(b.x+nx*br, b.y+ny*br);\n  ctx.lineTo(b.x-nx*br, b.y-ny*br);\n  ctx.lineTo(a.x-nx*ar, a.y-ny*ar);\n  ctx.closePath();\n  ctx.fill();\n  // round joint at b so successive ribbons blend seamlessly\n  ctx.beginPath(); ctx.arc(b.x,b.y,br,0,7); ctx.fill();\n}\n\nfunction startDraw(e){\n  if(e.button!=null && e.button!==0 && e.pointerType==='mouse') return;\n  e.preventDefault();\n  try{ ink.setPointerCapture(e.pointerId); }catch(_){}\n  pushUndo();\n  drawing=true;\n  const q=pos(e);\n  smoothW = targetWidth(q.p, 0) * curBrush().taperIn;   // taper-in: start a bit thinner\n  const first={x:q.x,y:q.y,w:smoothW};\n  strokePts=[first];\n  lastRaw=q;\n  const ctx=ink.getContext('2d');\n  ctx.globalCompositeOperation = state.tool==='erase'?'destination-out':'source-over';\n  ctx.fillStyle=curBrush().color||INK;\n  drawDot(ctx,q.x,q.y,first.w);\n  dirty=true;\n}\n\nfunction extendStroke(samples){\n  const ctx=ink.getContext('2d');\n  ctx.globalCompositeOperation = state.tool==='erase'?'destination-out':'source-over';\n  ctx.fillStyle=curBrush().color||INK;\n  for(const s of samples){\n    const q=pos(s);\n    const prev=strokePts[strokePts.length-1];\n    const dist=Math.hypot(q.x-prev.x,q.y-prev.y);\n    if(dist<0.8*PXSCALE) continue;       // skip jitter\n    // speed in px/ms for velocity thinning\n    const dt=Math.max(1, q.t-(lastRaw?lastRaw.t:q.t));\n    const speed=dist/dt;\n    lastRaw=q;\n    // exponential width smoothing -> no pulsing\n    const tw=targetWidth(q.p, speed);\n    smoothW += (tw-smoothW)*curBrush().smooth;\n    // catmull-ish midpoint to round the path: insert midpoint between prev and q\n    const mid={x:(prev.x+q.x)/2, y:(prev.y+q.y)/2, w:(prev.w+smoothW)/2};\n    ribbon(ctx, prev, mid);\n    const cur={x:q.x,y:q.y,w:smoothW};\n    ribbon(ctx, mid, cur);\n    strokePts.push(cur);\n  }\n}\n\nfunction moveDraw(e){\n  if(!drawing)return; e.preventDefault();\n  const ev = (e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e];\n  extendStroke(ev);\n  dirty=true;\n}\nfunction endDraw(e){\n  if(!drawing)return;\n  drawing=false;\n  // taper-out: shrink final cap a touch for a natural lift\n  if(strokePts.length){\n    const ctx=ink.getContext('2d');\n    ctx.fillStyle=curBrush().color||INK;\n    const last=strokePts[strokePts.length-1];\n    drawDot(ctx,last.x,last.y,last.w*curBrush().taperOut);\n  }\n  strokePts=[]; lastRaw=null;\n  scheduleSave();\n}\n\nink.addEventListener('pointerdown',startDraw);\nink.addEventListener('pointermove',moveDraw);\nink.addEventListener('pointerup',endDraw);\nink.addEventListener('pointercancel',endDraw);\nink.addEventListener('pointerleave',e=>{ if(drawing) endDraw(e); });\n\n// ---------- undo / redo ----------\nlet undoStack=[], redoStack=[];\nconst MAX_UNDO=30;\nfunction snapshot(){ return ink.getContext('2d').getImageData(0,0,ink.width,ink.height); }\nfunction restore(img){ ink.getContext('2d').putImageData(img,0,0); }\nfunction pushUndo(){\n  undoStack.push(snapshot());\n  if(undoStack.length>MAX_UNDO) undoStack.shift();\n  redoStack.length=0;\n  updateUndoButtons();\n}\nfunction doUndo(){\n  if(!undoStack.length) return;\n  redoStack.push(snapshot());\n  restore(undoStack.pop());\n  dirty=true; scheduleSave(); updateUndoButtons();\n}\nfunction doRedo(){\n  if(!redoStack.length) return;\n  undoStack.push(snapshot());\n  restore(redoStack.pop());\n  dirty=true; scheduleSave(); updateUndoButtons();\n}\nfunction resetUndo(){ undoStack.length=0; redoStack.length=0; updateUndoButtons(); }\nfunction updateUndoButtons(){\n  const u=$('#undoBtn'), r=$('#redoBtn');\n  if(u) u.disabled=!undoStack.length;\n  if(r) r.disabled=!redoStack.length;\n}\n\n// ---------- saving ----------\nlet saveT;\nfunction scheduleSave(){ clearTimeout(saveT); saveT=setTimeout(saveCurrent,400); }\nasync function saveCurrent(){\n  const ch=curList[state.index];\n  // detect emptiness\n  const ctx=ink.getContext('2d');\n  const data=ctx.getImageData(0,0,ink.width,ink.height).data;\n  let has=false; for(let i=3;i<data.length;i+=4){ if(data[i]>20){has=true;break;} }\n  if(!has){ try{ await idbDel(STORE,keyOf(ch)); }catch(_){}\n    written.delete(ch.codePointAt(0));\n    refreshCellStatus(ch); updateProgress(); updateActiveBatch(); dirty=false; return; }\n  const png=ink.toDataURL('image/png');\n  try{\n    await idbPut(STORE,keyOf(ch),{png, ts:Date.now()});\n  }catch(err){\n    // most likely the browser storage quota is full — warn loudly so the user\n    // doesn't keep writing under the false belief their work is being saved.\n    console.error('save failed',err);\n    dirty=true;\n    showStorageFullWarning();\n    return;\n  }\n  const isNew=!written.has(ch.codePointAt(0));\n  written.add(ch.codePointAt(0));\n  refreshCellStatus(ch); updateProgress(); updateActiveBatch(); dirty=false;\n  if(isNew){ maybeRemindBackup(); maybeRemindPack(); }\n  noteActivity();\n}\nlet storageWarned=false;\nfunction showStorageFullWarning(){\n  if(storageWarned) { toast('⚠ 儲存失敗，請立即匯出備份！'); return; }\n  storageWarned=true;\n  alert('⚠ 無法儲存這個字！\\n\\n你的瀏覽器本機儲存空間可能已滿，或處於無痕模式。\\n\\n請立刻按「💾 匯出」把目前進度存成檔案，以免遺失。之後可清出空間或換個瀏覽器再繼續。');\n}\n// 2.0 備份提醒：字數 / 待寫包完成 / 儲存空間 / 閒置 四種時機。\nlet lastRemindAt=0;\nlet backedUpCount=0, lastBackupTs=0;   // 上次備份時的進度（持久化於 META）\nconst REMIND_EVERY=50;                 // 每累積 50 個「未備份」的字提醒一次\nfunction unbacked(){ return Math.max(0, written.size - backedUpCount); }\nfunction maybeRemindBackup(){\n  const n=written.size, u=unbacked();\n  if(u>0 && u%REMIND_EVERY===0 && n!==lastRemindAt){\n    lastRemindAt=n;\n    showBackupReminder({kind:'count'});\n  }\n  // proactively check remaining storage every 25 new chars\n  if(n>0 && n%25===0) checkStorageHeadroom();\n}\n// Proactively warn BEFORE the quota runs out (instead of only on failure).\nlet storageLowWarned=false;\nasync function checkStorageHeadroom(){\n  try{\n    if(!navigator.storage || !navigator.storage.estimate) return;\n    const {usage,quota}=await navigator.storage.estimate();\n    if(!quota) return;\n    const ratio=usage/quota;\n    if(ratio>0.85 && !storageLowWarned){\n      storageLowWarned=true;\n      const usedMB=(usage/1048576).toFixed(0), quotaMB=(quota/1048576).toFixed(0);\n      showBackupReminder({kind:'storage', used:usedMB, quota:quotaMB});\n    }\n  }catch(_){}\n}\nlet remindTimer=null;\nfunction showBackupReminder(info){\n  info = (info && info.kind) ? info : {kind:'count'};\n  const scrim=$('#remindScrim');\n  const u=unbacked(), total=written.size;\n  let head;\n  if(info.kind==='pack') head='🎉「'+info.label+'」已全部寫完！';\n  else if(info.kind==='storage') head='⚠ 瀏覽器儲存空間已用 <b>'+info.used+' / '+info.quota+' MB<\u002Fb>';\n  else if(info.kind==='idle') head='休息前，先把進度存起來吧';\n  else head='已寫 <b>'+total+'<\u002Fb> 個字';\n  $('#remindText').innerHTML=head+(u>0?'<br>有 <b>'+u+'<\u002Fb> 個字尚未備份，請先存檔':'<br>目前進度已全部備份 ✓');\n  $('#remindSub').innerHTML=\n    '建議存檔格式：<b>.json 備份檔<\u002Fb>。按「立即備份」會自動命名為<br><b>'+backupFilename()+'<\u002Fb>（含字數與日期）。<br>'+\n    '新備份已包含先前全部內容，建議<b>先測試備份檔可還原（或匯出 TTF 檢閱）再刪除舊檔<\u002Fb>；'+\n    '之後按「📥 匯入」或把檔案拖進視窗即可完整還原。';\n  const closeBtn=$('#remindClose');\n  scrim.classList.add('show');\n  // disable close for 3 seconds, with a live countdown\n  let left=3;\n  closeBtn.disabled=true; closeBtn.textContent=`請稍候… ${left}`;\n  clearInterval(remindTimer);\n  remindTimer=setInterval(()=>{\n    left--;\n    if(left>0){ closeBtn.textContent=`請稍候… ${left}`; }\n    else{ clearInterval(remindTimer); closeBtn.disabled=false; closeBtn.textContent='我知道了'; }\n  },1000);\n}\nasync function saveCurrentIfDirty(){ if(dirty) await saveCurrent(); }\n\n// ---------- font building ----------\nfunction pathFromContours(contours){\n  // Smooth quadratic outline via the midpoint method, with correct hole\n  // winding determined by containment depth: a contour nested inside an odd\n  // number of others is a hole (opposite winding to fills).\n  const path=new opentype.Path();\n  if(!contours.length) return path;\n\n  // precompute polygons + areas + a representative interior point\n  const polys=contours.map(c=>{\n    const pts=c.map(p=>[p.x,p.y]);\n    return {c, pts, area:Tracer.signedArea(pts), abs:Math.abs(Tracer.signedArea(pts)),\n            rep:c[0] };\n  });\n  function pointInPoly(x,y,poly){\n    let inside=false;\n    for(let i=0,j=poly.length-1;i<poly.length;j=i++){\n      const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];\n      if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;\n    }\n    return inside;\n  }\n  // depth = how many OTHER contours contain this one's representative point\n  polys.forEach((p,i)=>{\n    let d=0;\n    for(let k=0;k<polys.length;k++){\n      if(k===i) continue;\n      if(polys[k].abs>p.abs && pointInPoly(p.rep.x,p.rep.y,polys[k].pts)) d++;\n    }\n    p.depth=d;\n  });\n\n  const CORNER=Math.cos(70*Math.PI/180);\n  const mid=(p,q)=>({x:(p.x+q.x)/2, y:(p.y+q.y)/2});\n\n  polys.forEach(o=>{\n    let pts=o.c.slice();\n    const isHole = (o.depth%2===1);\n    // fills clockwise (area<0 in y-up), holes counter-clockwise\n    const wantCW = !isHole;\n    if(wantCW !== (o.area<0)) pts.reverse();\n    const n=pts.length;\n    if(n<3){\n      pts.forEach((p,i)=> i?path.lineTo(p.x,p.y):path.moveTo(p.x,p.y));\n      path.close(); return;\n    }\n    const isCorner=new Array(n);\n    for(let i=0;i<n;i++){\n      const a=pts[(i-1+n)%n], b=pts[i], c=pts[(i+1)%n];\n      const v1x=a.x-b.x,v1y=a.y-b.y,v2x=c.x-b.x,v2y=c.y-b.y;\n      const l1=Math.hypot(v1x,v1y)||1,l2=Math.hypot(v2x,v2y)||1;\n      isCorner[i]=((v1x*v2x+v1y*v2y)/(l1*l2))>CORNER;\n    }\n    const startM=mid(pts[n-1], pts[0]);\n    path.moveTo(startM.x, startM.y);\n    for(let i=0;i<n;i++){\n      const v=pts[i], nx=pts[(i+1)%n];\n      const m=mid(v,nx);\n      if(isCorner[i]){ path.lineTo(v.x,v.y); path.lineTo(m.x,m.y); }\n      else path.quadraticCurveTo(v.x, v.y, m.x, m.y);\n    }\n    path.close();\n  });\n  return path;\n}\n\n// Build an opentype.Font from all written glyphs. onProgress(done,total,msg).\nasync function assembleFont(opts){\n  opts=opts||{}; const onP=opts.onProgress||(()=>{});\n  const keys=await idbKeys(STORE);\n  if(keys.length===0) return null;\n  const s=state.settings;\n  const scale=s.scale/100;\n  // Build ONLY the lightweight TrueType representation (command arrays).\n  // The heavy opentype.js Font is constructed lazily, only if OTF is requested.\n  const ttfGlyphs=[];\n  const nd=new opentype.Path();\n  nd.moveTo(100,0);nd.lineTo(100,700);nd.lineTo(600,700);nd.lineTo(600,0);nd.close();\n  nd.moveTo(160,60);nd.lineTo(540,60);nd.lineTo(540,640);nd.lineTo(160,640);nd.close();\n  ttfGlyphs.push({unicode:0, advanceWidth:UPM, commands:nd.commands});\n\n  const ascent=Math.round(UPM*0.88), descent=-Math.round(UPM*0.12);\n  const tmp=document.createElement('canvas'); tmp.width=CANVAS_PX;tmp.height=CANVAS_PX;\n  const tctx=tmp.getContext('2d');\n\n  let done=0;\n  for(const k of keys){\n    const cp=parseInt(k.slice(1),16);\n    const rec=await idbGet(STORE,k);\n    if(!rec||!rec.png){done++;continue;}\n    const img=new Image();\n    await new Promise((r,j)=>{img.onload=r;img.onerror=r;img.src=rec.png;});\n    tctx.clearRect(0,0,CANVAS_PX,CANVAS_PX);\n    try{ tctx.drawImage(img,0,0,CANVAS_PX,CANVAS_PX); }catch(_){}\n    img.src=''; // release decoded bitmap promptly\n    const res=Tracer.glyphFromCanvas(tmp,{upm:UPM,threshold:30,simplify:1.1*PXSCALE});\n\n    let advance=UPM;\n    let path=new opentype.Path();\n    if(!res.empty && res.contours.length){\n      const cx=UPM/2, cy=UPM/2;\n      let cs=res.contours;\n      if(scale!==1){\n        cs=cs.map(c=>c.map(p=>({x:cx+(p.x-cx)*scale, y:cy+(p.y-cy)*scale})));\n      }\n      path=pathFromContours(cs);\n      const isAscii=cp<0x2E80;\n      // 2.0 自動校正：僅平移漢字墨跡（標點、英數保持原樣）\n      const isIdeo=(cp>=0x3400&&cp<=0x4DBF)||(cp>=0x4E00&&cp<=0x9FFF)||(cp>=0xF900&&cp<=0xFAFF)||cp>=0x20000;\n      const alignMode=s.align||'off';\n      if(alignMode!=='off' && isIdeo){\n        const bb0=path.getBoundingBox();\n        if(isFinite(bb0.x1)){\n          let adx=0, ady=0;\n          if(alignMode==='v')      adx=Math.round(UPM/2-(bb0.x1+bb0.x2)/2);   // 直排：水平置中，整行不歪斜\n          else if(alignMode==='h') ady=Math.round(UPM/2-(bb0.y1+bb0.y2)/2);   // 橫排：垂直置中，整行不跳動\n          if(adx||ady) for(const c of path.commands){\n            if(c.x!=null)c.x+=adx; if(c.x1!=null)c.x1+=adx; if(c.x2!=null)c.x2+=adx;\n            if(c.y!=null)c.y+=ady; if(c.y1!=null)c.y1+=ady; if(c.y2!=null)c.y2+=ady;\n          }\n        }\n      }\n      if(isAscii || (s.width==='prop' && alignMode!=='v')){\n        const bb=path.getBoundingBox();\n        if(isFinite(bb.x1)){\n          const left=Math.max(0,bb.x1), right=bb.x2;\n          const sidebearing=UPM*0.06;\n          advance=Math.round((right-left)+sidebearing*2);\n          path.commands.forEach(c=>{ if(c.x!=null)c.x-=left-sidebearing;\n            if(c.x1!=null)c.x1-=left-sidebearing; if(c.x2!=null)c.x2-=left-sidebearing;});\n          if(isAscii) advance=Math.max(advance, Math.round(UPM*0.28));\n        }\n      }\n    }\n    ttfGlyphs.push({unicode:cp, advanceWidth:advance, commands:path.commands});\n    done++;\n    if(done%5===0||done===keys.length){\n      onP(done,keys.length); await new Promise(r=>setTimeout(r));\n    }\n  }\n  let name=s.enName.replace(/[^A-Za-z0-9]/g,'')||'MyHandwriting';\n  if(opts.nameSuffix) name+=opts.nameSuffix;\n  return { name, count:keys.length, zhName:s.zhName||'',\n           ttfData:{familyName:name, zhName:s.zhName||'', styleName:'Regular', unitsPerEm:UPM,\n                    ascender:ascent, descender:descent, glyphs:ttfGlyphs} };\n}\n\n// Build an opentype.js Font (CFF/OTF) from ttfData, lazily — only when OTF is\n// needed. This is the memory-heavy path, isolated so it can fail gracefully.\nfunction buildOtfBuffer(built){\n  const d=built.ttfData;\n  const glyphs=d.glyphs.map(g=>{\n    const path=new opentype.Path();\n    for(const c of g.commands){\n      if(c.type==='M')path.moveTo(c.x,c.y);\n      else if(c.type==='L')path.lineTo(c.x,c.y);\n      else if(c.type==='Q')path.quadraticCurveTo(c.x1,c.y1,c.x,c.y);\n      else if(c.type==='C')path.curveTo(c.x1,c.y1,c.x2,c.y2,c.x,c.y);\n      else if(c.type==='Z')path.close();\n    }\n    return new opentype.Glyph({\n      name: g.unicode? 'uni'+g.unicode.toString(16).toUpperCase().padStart(4,'0') : '.notdef',\n      unicode:g.unicode, advanceWidth:g.advanceWidth, path });\n  });\n  const font=new opentype.Font({familyName:d.familyName, styleName:'Regular',\n    unitsPerEm:d.unitsPerEm, ascender:d.ascender, descender:d.descender, glyphs});\n  try{\n    font.names.fontFamily={en:d.familyName, zh:built.zhName};\n    font.names.fullName={en:d.familyName, zh:built.zhName};\n    font.names.postScriptName={en:d.familyName};\n  }catch(e){}\n  return font.toArrayBuffer();\n}\n\nasync function buildFont(test){\n  const exp=$('#expScrim'); exp.classList.add('show');\n  $('#expClose').style.display='none';\n  const status=$('#expStatus'), bar=$('#expBar');\n  const setS=(m,pct)=>{status.textContent=m; bar.style.width=pct+'%';};\n  if(typeof opentype==='undefined'){\n    setS('字型引擎未載入，請重新整理頁面再試。',100);\n    $('#expClose').style.display=''; $('#expClose').onclick=()=>exp.classList.remove('show');\n    return;\n  }\n  try{\n    await saveCurrentIfDirty();\n    // 大字庫預先提醒：防止使用者不知情下進入長時間、高記憶體的產字流程\n    if(written.size>5000){\n      const mins=Math.max(1,Math.ceil(written.size/200/60));\n      const ok=confirm('目前已寫 '+written.size+' 個字。\\n\\n產生字型約需 '+mins+' 分鐘以上（依電腦效能而定），過程中請勿關閉分頁。\\n建議先按「💾 匯出」備份再繼續（行動裝置或低記憶體電腦可能失敗）。\\n\\n要現在開始產生嗎？');\n      if(!ok){ exp.classList.remove('show'); return; }\n    }\n    setS('收集已書寫的字…',3);\n    const built=await assembleFont({\n      nameSuffix: test?('-'+Date.now().toString().slice(-5)):'',\n      onProgress:(d,t)=>setS(`描繪字形外框 ${d}/${t}…`, 5+85*d/t)\n    });\n    if(!built){ toast('還沒有任何字，先寫幾個字吧'); exp.classList.remove('show'); return; }\n    const links=[];\n    const mk=(buf)=>URL.createObjectURL(new Blob([buf],{type:'application/octet-stream'}));\n    // TTF first — our own writer is memory-light and is the primary, most\n    // compatible output. Always attempt it.\n    setS('組裝 TrueType（TTF）…',95);\n    await new Promise(r=>setTimeout(r));\n    try{\n      let ttfBuf=TTFWriter.build(built.ttfData);\n      links.push({label:'⬇ 下載 '+built.name+'.ttf', sub:'TrueType（glyf 曲線，相容性最高，建議用這個）',\n        fname:built.name+'.ttf', url:mk(ttfBuf)});\n      ttfBuf=null;\n    }catch(e){ console.error('TTF build failed',e); }\n    // OTF via opentype.js is memory-heavy and can hard-crash (OOM) on large\n    // fonts — and an OOM abort cannot be caught by try/catch. So we only build\n    // OTF when the glyph count is safely small; otherwise TTF alone is provided\n    // (TTF is fully installable and is the recommended format anyway).\n    const OTF_SAFE_LIMIT=800;\n    if(built.count<=OTF_SAFE_LIMIT){\n      setS('組裝 OpenType（OTF）…',98);\n      await new Promise(r=>setTimeout(r));\n      try{\n        let otfBuf=buildOtfBuffer(built);\n        links.push({label:'⬇ 下載 '+built.name+'.otf', sub:'OpenType（CFF 曲線，檔案較小）',\n          fname:built.name+'.otf', url:mk(otfBuf)});\n        otfBuf=null;\n      }catch(e){ console.error('OTF build failed',e); }\n    }\n    if(!links.length){ setS('字數過多，記憶體不足以產生字型。建議先按「💾 匯出」備份，再分批產生。',100);\n      $('#expClose').style.display=''; $('#expClose').onclick=()=>exp.classList.remove('show'); return; }\n    let note=`✓ 已產生 <b>${built.count}<\u002Fb> 個字形`;\n    if(links.length===1 && built.count>800) note+='<br><span style=\"font-size:12px;color:var(--ink-soft)\">（字數較多，為避免當機僅產生 TTF；TTF 已可完整安裝使用）<\u002Fspan>';\n    showDownloadLinks(note, links);\n    return;\n  }catch(err){\n    console.error(err);\n    setS('產生字型時發生錯誤：'+(err&&err.message?err.message:err),100);\n  }\n  $('#expClose').style.display='';\n  $('#expClose').onclick=()=>exp.classList.remove('show');\n  setTimeout(()=>{ if(exp.classList.contains('show')&&!status.textContent.includes('錯誤')) exp.classList.remove('show'); },2600);\n}\n\n// ---------- live preview: inject font via FontFace, type to test ----------\nlet previewFontFace=null;\nasync function openPreview(){\n  await saveCurrentIfDirty();\n  if(written.size>5000){\n    const mins=Math.max(1,Math.ceil(written.size/200/60));\n    const ok=confirm('預覽需先組成全部 '+written.size+' 個字形，約需 '+mins+' 分鐘以上。要繼續嗎？');\n    if(!ok) return;\n  }\n  const exp=$('#expScrim'); exp.classList.add('show');\n  $('#expClose').style.display='none';\n  const status=$('#expStatus'), bar=$('#expBar');\n  status.textContent='組成預覽字型…'; bar.style.width='5%';\n  const built=await assembleFont({\n    nameSuffix:'-Preview-'+Date.now().toString().slice(-4),\n    onProgress:(d,t)=>{status.textContent=`描繪字形 ${d}/${t}…`; bar.style.width=(5+85*d/t)+'%';}\n  });\n  exp.classList.remove('show');\n  if(!built){ toast('還沒有任何字，先寫幾個字吧'); return; }\n  // use the memory-light TTF for preview (avoids opentype.js OOM on big sets)\n  let buf;\n  try{ buf=TTFWriter.build(built.ttfData); }\n  catch(e){ console.error(e); toast('字數過多，預覽無法一次載入，請先分批或直接產生字型'); return; }\n  if(previewFontFace){ try{document.fonts.delete(previewFontFace);}catch(e){} }\n  previewFontFace=new FontFace(built.name, buf.buffer||buf);\n  await previewFontFace.load();\n  document.fonts.add(previewFontFace);\n  // open the preview modal\n  const pv=$('#pvScrim'); pv.classList.add('show');\n  $('#pvSample').style.fontFamily=`\"${built.name}\", \"Noto Serif TC\", serif`;\n  $('#pvMeta').textContent=`已收錄 ${built.count} 字 · 未寫的字會以系統字型顯示`;\n  renderPreviewText();\n}\nfunction renderPreviewText(){\n  const txt=$('#pvInput').value || $('#pvInput').placeholder;\n  const size=$('#pvSize').value;\n  const vert=$('#pvVert').checked;\n  const el=$('#pvSample');\n  el.textContent=txt;\n  el.style.fontSize=size+'px';\n  el.style.writingMode=vert?'vertical-rl':'horizontal-tb';\n  $('#pvSizeVal').textContent=size+'px';\n}\n\n// ---------- 匯出前：自動校正選擇 ----------\nconst ALIGN_HINTS={\n  h:'適合橫向書寫：自動將每個漢字「垂直置中」，整行文字不會忽高忽低。',\n  v:'適合直向書寫：自動將每個漢字「水平置中」並採等寬字身，整列不歪斜。',\n  off:'完全保留你書寫時的位置，不做任何平移。'\n};\nfunction refreshAlignSeg(){\n  const a=state.settings.align||'h';\n  $$('#alignSeg button').forEach(b=>b.classList.toggle('on',b.dataset.a===a));\n  $('#alignHint').textContent=ALIGN_HINTS[a]||'';\n}\nfunction openAlignModal(){\n  refreshAlignSeg();\n  $('#alignScrim').classList.add('show');\n}\n\n// ---------- backup ----------\nasync function exportBackup(packOnly){\n  const exp=$('#expScrim'); exp.classList.add('show');\n  $('#expClose').style.display='none';\n  const status=$('#expStatus'), bar=$('#expBar');\n  const setS=(m,pct)=>{status.textContent=m; bar.style.width=pct+'%';};\n  try{\n    await saveCurrentIfDirty();\n    setS('收集已寫的字…',5);\n    let keys=await idbKeys(STORE);\n    let packTag='';\n    if(packOnly && state.batchSize && batchBounds[state.batch]){\n      const [bs,be]=batchBounds[state.batch];\n      const inPack=new Set();\n      for(let i=bs;i<be;i++) inPack.add(curList[i].codePointAt(0));\n      keys=keys.filter(k=>inPack.has(parseInt(k.slice(1),16)));\n      packTag='-'+batchLabel(state.batch);\n    }\n    if(!keys.length){ setS(packOnly?'目前這包還沒有寫任何字。':'還沒有任何字。',100);\n      $('#expClose').style.display=''; $('#expClose').onclick=()=>exp.classList.remove('show'); return; }\n    // Build the JSON in chunks to avoid one giant in-memory object +\n    // stringify spike. We assemble an array of Blob parts and let the Blob\n    // constructor concatenate them lazily, instead of one mega-string.\n    const parts=[];            // Blob 分塊：字串隨打隨釋放，避免大字庫時記憶體暴增\n    let buf=['{\"v\":1,\"settings\":'+JSON.stringify(state.settings)+',\"glyphs\":{'];\n    const flush=()=>{ if(buf.length){ parts.push(new Blob(buf)); buf=[]; } };\n    let first=true, done=0;\n    for(const k of keys){\n      const rec=await idbGet(STORE,k);\n      if(!rec) { done++; continue; }\n      buf.push((first?'':',')+JSON.stringify(k)+':'+JSON.stringify(rec));\n      first=false;\n      done++;\n      if(buf.length>=200) flush();\n      if(done%40===0){\n        setS(`打包中 ${done}/${keys.length}…`, 5+85*done/keys.length);\n        await new Promise(r=>setTimeout(r));   // yield so UI/GC can breathe\n      }\n    }\n    buf.push('}}'); flush();\n    setS('產生備份檔…',95);\n    const blob=new Blob(parts,{type:'application/json'});\n    const url=URL.createObjectURL(blob);\n    const stamp=new Date().toISOString().slice(0,10).replace(/-/g,'');\n    const fname=(state.settings.enName||'mogeh')+packTag+'-'+keys.length+'字-'+stamp+'.json';\n    showDownloadLink(`✓ 備份完成：${keys.length} 個字`, fname, url, true);\n    const tip=document.createElement('div');\n    tip.className='note';\n    tip.style.marginTop='10px';\n    tip.innerHTML='🧹 這份備份已包含之前的全部內容。建議先<b>實際測試這份 .json（匯入還原）<\u002Fb>或<b>匯出 TTF 檢閱可用<\u002Fb>，確認無誤後再刪除舊的備份檔。<b>手機／平板<\u002Fb>用戶請務必預留足夠儲存空間。';\n    $('#expStatus').appendChild(tip);\n    if(!packOnly) markBackedUp(keys.length);\n  }catch(err){\n    console.error(err);\n    setS('備份時發生錯誤：'+(err&&err.message?err.message:err),100);\n    $('#expClose').style.display=''; $('#expClose').onclick=()=>exp.classList.remove('show');\n  }\n}\n\n// Show one or more download links inside the export modal (sandbox-safe).\nfunction showDownloadLinks(title, links){\n  const exp=$('#expScrim'); exp.classList.add('show');\n  const status=$('#expStatus'), bar=$('#expBar');\n  $('#expClose').style.display='';\n  $('#expClose').onclick=()=>exp.classList.remove('show');\n  bar.style.width='100%';\n  status.innerHTML='';\n  const wrap=document.createElement('div');\n  wrap.style.cssText='display:flex;flex-direction:column;gap:10px;align-items:stretch;text-align:center';\n  const t=document.createElement('div');\n  t.style.cssText='font-size:14px;color:var(--ink);margin-bottom:2px'; t.innerHTML=title;\n  wrap.appendChild(t);\n  for(const lk of links){\n    const dl=document.createElement('a');\n    dl.href=lk.url; dl.download=lk.fname; dl.target='_blank'; dl.rel='noopener';\n    dl.style.cssText='display:block;background:var(--seal);color:#fff;text-decoration:none;'\n      +'padding:10px 18px;border-radius:9px;font-size:15px;font-weight:600;line-height:1.3';\n    dl.innerHTML=lk.label + (lk.sub?`<div style=\"font-size:11px;font-weight:400;opacity:.85;margin-top:2px\">${lk.sub}<\u002Fdiv>`:'');\n    wrap.appendChild(dl);\n    setTimeout(()=>URL.revokeObjectURL(lk.url), lk.life||180000);\n  }\n  const hint=document.createElement('div');\n  hint.style.cssText='font-size:12px;color:var(--ink-soft);line-height:1.6;margin-top:4px';\n  hint.textContent='若點擊後被攔截，請用瀏覽器直接開啟本檔案（非預覽視窗）後再下載。';\n  wrap.appendChild(hint);\n  status.appendChild(wrap);\n}\n// single-link convenience (used by backup). longLife keeps the URL valid\n// for 30 min so big backups aren't revoked before the user taps download.\nfunction showDownloadLink(title, fname, url, longLife){\n  showDownloadLinks(title, [{label:'⬇ 下載 '+fname, fname, url, life: longLife?1800000:180000}]);\n}\nasync function importBackup(file){\n  const exp=$('#expScrim'); exp.classList.add('show');\n  $('#expClose').style.display='none';\n  const status=$('#expStatus'), bar=$('#expBar');\n  const setS=(m,pct)=>{status.textContent=m; bar.style.width=pct+'%';};\n  try{\n    setS('讀取備份檔…',5);\n    if(file.size>200*1048576){\n      const ok=confirm('這個備份檔很大（'+Math.round(file.size/1048576)+' MB），還原時可能佔用數 GB 記憶體，低記憶體裝置可能失敗。\\n\\n建議大量創作時改用「📦 只匯出目前這包」分包備份。要繼續還原嗎？');\n      if(!ok){ exp.classList.remove('show'); return; }\n    }\n    const txt=await file.text();\n    let data;\n    try{ data=JSON.parse(txt); }\n    catch(_){ throw new Error('不是有效的 JSON 備份檔'); }\n    const glyphs=data.glyphs||{};\n    const gkeys=Object.keys(glyphs);\n    if(!gkeys.length){ setS('這個備份檔沒有任何字。',100);\n      $('#expClose').style.display=''; $('#expClose').onclick=()=>exp.classList.remove('show'); return; }\n    // basic format sanity: each entry should carry a png dataURL\n    const sample=glyphs[gkeys[0]];\n    if(!sample || typeof sample.png!=='string' || !sample.png.startsWith('data:image')){\n      throw new Error('備份檔格式不符（缺少字形資料）');\n    }\n    // if the user already has work, confirm before merging\n    const existing=written.size;\n    if(existing>0){\n      const ok=confirm(\n        `這個備份檔含有 ${gkeys.length} 個字。\\n`+\n        `目前已寫了 ${existing} 個字。\\n\\n`+\n        `還原會把備份中的字「合併」進來（同一個字會以備份內容覆蓋，其餘保留）。\\n\\n`+\n        `要繼續嗎？建議先按「💾 備份」存一份目前進度。`);\n      if(!ok){ exp.classList.remove('show'); return; }\n    }\n    if(data.settings) Object.assign(state.settings,data.settings);\n    let done=0;\n    for(const k of gkeys){\n      await idbPut(STORE,k,glyphs[k]);\n      const cp=parseInt(k.slice(1),16); if(!isNaN(cp)) written.add(cp);\n      done++;\n      if(done%40===0){ setS(`還原中 ${done}/${gkeys.length}…`,5+90*done/gkeys.length);\n        await new Promise(r=>setTimeout(r)); }\n    }\n    setS('整理中…',97);\n    if(state.batchSize!=null) $('#batchSize').value=String(state.batchSize);\n    applySettings();\n    loadTier(state.tier);          // rebuild list/bounds and grid\n    exp.classList.remove('show');\n    toast(`已還原 ${gkeys.length} 個字`);\n  }catch(err){\n    console.error(err);\n    setS('還原失敗：'+(err&&err.message?err.message:'檔案可能損毀或格式不符'),100);\n    $('#expClose').style.display=''; $('#expClose').onclick=()=>exp.classList.remove('show');\n  }\n}\n\n// ---------- settings UI ----------\nfunction applySettings(){\n  const s=state.settings;\n  $('#fEnName').value=s.enName; $('#fZhName').value=s.zhName;\n  $('#fScale').value=s.scale; $('#scaleVal').textContent=s.scale+'%';\n  $('#brushSize').value=s.brush; $('#brushVal').textContent=s.brush;\n  $('#pressureOn').checked=s.pressure;\n  $('#gridStyle').value=s.grid;\n  $('#refCharOn').checked=s.refChar!==false;\n  $('#penType').value=s.pen||'brush';\n  $$('#widthSeg button').forEach(b=>b.classList.toggle('on',b.dataset.w===s.width));\n  drawGrid();\n}\nasync function persistSettings(){ state.settings.batchSize=state.batchSize; try{ await idbPut(META,'settings',state.settings); }catch(_){} }\n\n// ---------- 2.0 響應式側欄（桌機收合／手機抽屜） ----------\nfunction isMobile(){ return window.matchMedia('(max-width:780px)').matches; }\nfunction sidebarOpen(){\n  return isMobile() ? $('#sidebar').classList.contains('open')\n                    : !document.querySelector('.app').classList.contains('sb-closed');\n}\nfunction setSidebar(open){\n  if(isMobile()){\n    $('#sidebar').classList.toggle('open',open);\n    $('#sbBackdrop').classList.toggle('show',open);\n  }else{\n    document.querySelector('.app').classList.toggle('sb-closed',!open);\n    $('#sbCollapse').textContent=open?'❬':'❭';\n    $('#sbCollapse').title=open?'收合字表':'展開字表';\n    try{ localStorage.setItem('moge2_sidebar', open?'1':'0'); }catch(_){}\n    setTimeout(sizeCanvas,320);\n  }\n}\n\nfunction wireUI(){\n  // tier tabs\n  $$('.tier-tabs button').forEach(b=>b.onclick=()=>loadTier(b.dataset.tier));\n  // search jump\n  $('#charSearch').oninput=e=>{\n    const v=e.target.value.trim(); if(!v)return;\n    const ch=[...v][0]; const i=curList.indexOf(ch);\n    if(i>=0){ selectGlobal(i); } else toast('此字不在目前字集');\n  };\n  // batch size selector\n  $('#batchSize').onchange=e=>{\n    state.batchSize=Math.max(50,+e.target.value||100);\n    buildBatchBounds();\n    state.batch = state.batchSize ? batchOf(state.index) : 0;\n    renderBatches(); applyBatch(); selectGlobal(state.index); persistSettings();\n  };\n  // nav\n  $('#prevChar').onclick=()=>selectIndex(state.index-1);\n  $('#nextChar').onclick=()=>selectIndex(state.index+1);\n  $('#saveNext').onclick=async()=>{await saveCurrent();selectIndex(state.index+1);};\n  $('#nextEmpty').onclick=async()=>{\n    await saveCurrent();\n    // search forward within whole tier from current+1, wrap once\n    const N=curList.length;\n    for(let k=1;k<=N;k++){\n      const gi=(state.index+k)%N;\n      if(!written.has(curList[gi].codePointAt(0))){ selectGlobal(gi); return; }\n    }\n    toast('這個字集已全部寫完 🎉');\n  };\n  document.addEventListener('keydown',e=>{\n    if(e.target.tagName==='INPUT')return;\n    const mod=e.ctrlKey||e.metaKey;\n    if(mod && e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); doUndo(); return; }\n    if(mod && (e.key.toLowerCase()==='y' || (e.key.toLowerCase()==='z'&&e.shiftKey))){ e.preventDefault(); doRedo(); return; }\n    if(mod) return;\n    if(e.key==='ArrowRight')selectIndex(state.index+1);\n    if(e.key==='ArrowLeft')selectIndex(state.index-1);\n    if(e.key.toLowerCase()==='p'){ $('#penTool').click(); }\n    if(e.key.toLowerCase()==='e'){ $('#eraseTool').click(); }\n  });\n  // tools\n  $('#penTool').onclick=()=>{state.tool='pen';$('#penTool').classList.add('on');$('#eraseTool').classList.remove('on');};\n  $('#eraseTool').onclick=()=>{state.tool='erase';$('#eraseTool').classList.add('on');$('#penTool').classList.remove('on');};\n  $('#undoBtn').onclick=doUndo;\n  $('#redoBtn').onclick=doRedo;\n  $('#clearBtn').onclick=async()=>{ pushUndo(); ink.getContext('2d').clearRect(0,0,ink.width,ink.height);\n    dirty=true; await saveCurrent(); };\n  // brush\n  $('#brushSize').oninput=e=>{state.settings.brush=+e.target.value;$('#brushVal').textContent=e.target.value;persistSettings();};\n  $('#pressureOn').onchange=e=>{state.settings.pressure=e.target.checked;persistSettings();};\n  $('#gridStyle').onchange=e=>{state.settings.grid=e.target.value;drawGrid();persistSettings();};\n  $('#refCharOn').onchange=e=>{state.settings.refChar=e.target.checked;drawGrid();persistSettings();};\n  $('#penType').onchange=e=>{state.settings.pen=e.target.value;persistSettings();};\n  // settings modal\n  $('#setBtn').onclick=()=>{applySettings();$('#setScrim').classList.add('show');};\n  $('#fScale').oninput=e=>{state.settings.scale=+e.target.value;$('#scaleVal').textContent=e.target.value+'%';persistSettings();};\n  $('#fEnName').oninput=e=>{state.settings.enName=e.target.value;persistSettings();};\n  $('#fZhName').oninput=e=>{state.settings.zhName=e.target.value;persistSettings();};\n  $$('#widthSeg button').forEach(b=>b.onclick=()=>{state.settings.width=b.dataset.w;applySettings();persistSettings();});\n  $$('[data-close]').forEach(b=>b.onclick=()=>b.closest('.scrim').classList.remove('show'));\n  // export / preview（匯出前先經自動校正設定）\n  $('#exportBtn').onclick=openAlignModal;\n  $$('#alignSeg button').forEach(b=>b.onclick=()=>{state.settings.align=b.dataset.a;refreshAlignSeg();persistSettings();});\n  $('#alignGo').onclick=()=>{ $('#alignScrim').classList.remove('show'); buildFont(false); };\n  $('#previewBtn').onclick=openPreview;\n  $('#pvInput').oninput=renderPreviewText;\n  $('#pvSize').oninput=renderPreviewText;\n  $('#pvVert').onchange=renderPreviewText;\n  $$('.pv-presets button').forEach(b=>b.onclick=()=>{$('#pvInput').value=b.dataset.t;renderPreviewText();});\n  $('#pvRebuild').onclick=()=>{ $('#pvScrim').classList.remove('show'); openPreview(); };\n  $('#pvExport').onclick=()=>{ $('#pvScrim').classList.remove('show'); openAlignModal(); };\n  // backup\n  $('#backupBtn').onclick=()=>exportBackup(false);\n  $('#backupPackBtn').onclick=()=>exportBackup(true);\n  $('#quickBackupBtn').onclick=()=>exportBackup(false);\n  $('#quickRestoreBtn').onclick=()=>$('#quickRestoreFile').click();\n  $('#quickRestoreFile').onchange=e=>{ if(e.target.files[0]){ importBackup(e.target.files[0]); e.target.value=''; } };\n  // drag-and-drop a .json backup anywhere on the page to restore\n  const drop=$('#dropOverlay');\n  let dragDepth=0;\n  function isJsonDrag(e){ return e.dataTransfer && [...(e.dataTransfer.items||[])].some(it=>it.kind==='file'); }\n  window.addEventListener('dragenter',e=>{ if(isJsonDrag(e)){ e.preventDefault(); dragDepth++; drop.classList.add('show'); }});\n  window.addEventListener('dragover',e=>{ if(drop.classList.contains('show')) e.preventDefault(); });\n  window.addEventListener('dragleave',e=>{ if(drop.classList.contains('show')){ dragDepth--; if(dragDepth<=0){ dragDepth=0; drop.classList.remove('show'); } }});\n  window.addEventListener('drop',e=>{\n    if(!drop.classList.contains('show')) return;\n    e.preventDefault(); dragDepth=0; drop.classList.remove('show');\n    const f=e.dataTransfer.files && e.dataTransfer.files[0];\n    if(!f) return;\n    if(!/\\.json$/i.test(f.name) && f.type!=='application/json'){ toast('請放入 .json 備份檔'); return; }\n    importBackup(f);\n  });\n  $('#remindClose').onclick=()=>{ if(!$('#remindClose').disabled) $('#remindScrim').classList.remove('show'); };\n  $('#remindBackupNow').onclick=()=>{ $('#remindScrim').classList.remove('show'); clearInterval(remindTimer); exportBackup(); };\n  $('#restoreBtn').onclick=()=>$('#restoreFile').click();\n  $('#restoreFile').onchange=e=>{if(e.target.files[0])importBackup(e.target.files[0]);};\n  $('#wipeBtn').onclick=async()=>{ if(confirm('確定要完全清除所有手寫字資料嗎？此動作無法復原！')){\n    await idbClear(STORE); written.clear(); renderGrid(); renderBatches(); updateProgress();\n    ink.getContext('2d').clearRect(0,0,ink.width,ink.height); resetUndo(); toast('已清除全部資料'); } };\n  // one-tap clear (top toolbar) — choose current pack or everything\n  $('#wipeAllBtn').onclick=()=>{\n    // counts for the confirm dialog\n    const total=written.size;\n    let packN=0;\n    if(state.batchSize && batchBounds[state.batch]){\n      const [s,e]=batchBounds[state.batch]; packN=writtenInRange(s,e);\n    }\n    const packLabel=batchLabel(state.batch)
