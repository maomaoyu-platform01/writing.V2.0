r-warm);\\n  }\\n  .gm-info { display: flex; flex-direction: column; margin-right: auto; }\\n  .gm-title { font-size: 20px; font-weight: 600; color: var(--ink); }\\n  .gm-sub {\\n    font-family: ui-monospace, monospace; font-size: 13px;\\n    letter-spacing: 0.08em; color: var(--muted); margin-top: 2px;\\n  }\\n  .gm-zoom button {\\n    flex: none; min-width: 56px; font-size: 16px; padding: 8px 14px;\\n  }\\n  .gm-close {\\n    flex: none; background: transparent; border: 1px solid var(--line);\\n    color: var(--muted); width: 40px; height: 40px; border-radius: 4px;\\n    font-size: 24px; line-height: 1; cursor: pointer; transition: .2s;\\n  }\\n  .gm-close:hover { background: var(--accent); color: var(--paper); border-color: var(--accent); }\\n  .gm-panel {\\n    position: relative;\\n  }\\n  .gm-stage {\\n    flex: 1; overflow: auto; position: relative;\\n    background:\\n      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--line) 39px, var(--line) 40px),\\n      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--line) 39px, var(--line) 40px),\\n      var(--paper);\\n  }\\n  /* 內層隨字符自然撐大，padding 四周留白；比視窗大時整塊可捲動 */\\n  .gm-canvas {\\n    width: max-content; min-width: 100%;\\n    box-sizing: border-box;\\n    padding: 80px;\\n    display: flex; align-items: center; justify-content: center;\\n  }\\n  .gm-glyph {\\n    font-family: var(--pv, inherit);\\n    color: var(--ink); line-height: 1;\\n    user-select: none;\\n    flex: none;\\n  }\\n  .gm-nav {\\n    position: absolute; top: 50%; transform: translateY(-50%);\\n    z-index: 5;\\n    width: 52px; height: 52px; border-radius: 50%;\\n    background: var(--card); border: 1px solid var(--line);\\n    color: var(--ink); font-size: 30px; line-height: 1;\\n    display: flex; align-items: center; justify-content: center;\\n    cursor: pointer; transition: .18s;\\n    box-shadow: 0 4px 16px rgba(0,0,0,0.18);\\n  }\\n  .gm-nav:hover { background: var(--accent); color: var(--paper); border-color: var(--accent); }\\n  .gm-nav:disabled { opacity: 0.3; cursor: not-allowed; }\\n  .gm-nav:disabled:hover { background: var(--card); color: var(--ink); border-color: var(--line); }\\n  .gm-prev { left: 18px; padding-right: 3px; }\\n  .gm-next { right: 18px; padding-left: 3px; }\\n  .area-pad { padding-bottom: 70px; }\\n\\n  /* 側欄手寫縮圖 */\\n  .fi-glyph-thumb {\\n    display: inline-flex; vertical-align: middle; margin-right: 8px;\\n    width: 30px; height: 30px; border-radius: 4px;\\n    background: var(--paper); align-items: center; justify-content: center;\\n    overflow: hidden;\\n  }\\n  .fi-glyph-thumb img { width: 100%; height: 100%; object-fit: contain; }\\n\\n  /* 手寫造字檔預覽 */\\n  .hg-note {\\n    font-size: 17px; line-height: 1.6; color: var(--muted);\\n    max-width: 60ch;\\n  }\\n  .handglyph-grid {\\n    display: grid;\\n    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));\\n    gap: 1px; background: var(--line);\\n    border: 1px solid var(--line);\\n  }\\n  .hg-cell {\\n    background: var(--card); cursor: pointer;\\n    display: flex; flex-direction: column; align-items: center;\\n    padding: 10px 6px 8px; transition: background .15s;\\n  }\\n  .hg-cell:hover { background: var(--paper-warm); }\\n  .hg-img {\\n    width: 100%; aspect-ratio: 1;\\n    display: flex; align-items: center; justify-content: center;\\n  }\\n  .hg-img img { max-width: 100%; max-height: 100%; object-fit: contain; }\\n  .hg-label {\\n    margin-top: 4px;\\n    font-family: ui-monospace, monospace; font-size: 16px;\\n    color: var(--accent-deep); font-weight: 600;\\n  }\\n\\n  @media (max-width: 760px) {\\n    .app { grid-template-columns: 1fr; }\\n    .sidebar { position: relative; height: auto; }\\n    .specimen-area { padding: 0 22px; }\\n    .drop-hint { left: 0; }\\n  }\\n<\\/style>\\n<\\/head>\\n<body>\\n<div class=\\\"app\\\">\\n  <!-- ============ SIDEBAR ============ -->\\n  <aside class=\\\"sidebar\\\">\\n    <div class=\\\"sb-head\\\">\\n      <div class=\\\"sb-brand\\\">\\n        字型<span>試演所<\\/span><em class=\\\"sb-ver\\\">2.0<\\/em>\\n      <\\/div>\\n      <div class=\\\"sb-tag\\\">(墨格 2.0 · 檢視你的創作)<\\/div>\\n      <div class=\\\"sb-credit\\\">Design by 毛毛雨的晴天<\\/div>\\n    <\\/div>\\n    <div class=\\\"sb-list\\\" id=\\\"sbList\\\">\\n      <div class=\\\"sb-empty\\\" id=\\\"sbEmpty\\\">尚無字型<br>把檔案丟進來開始<\\/div>\\n    <\\/div>\\n    <div class=\\\"sb-foot\\\">\\n      <input type=\\\"file\\\" id=\\\"file\\\" accept=\\\".otf,.ttf,.woff,.woff2,.ttc\\\" multiple hidden>\\n      <input type=\\\"file\\\" id=\\\"jsonFile\\\" accept=\\\".json,application/json\\\" hidden>\\n      <button class=\\\"add-btn\\\" id=\\\"syncBtn\\\" style=\\\"display:none;margin-bottom:8px;background:transparent;color:var(--accent);border:1px solid var(--accent)\\\">⟳ 同步手寫進度<\\/button>\\n      <button class=\\\"add-btn\\\" id=\\\"addBtn\\\">＋ 載入字型檔<\\/button>\\n      <div class=\\\"sb-io\\\">\\n        <button class=\\\"io-btn\\\" id=\\\"exportJsonBtn\\\" title=\\\"把目前所有字型與設定打包成 JSON\\\" disabled>↧ 匯出 JSON<\\/button>\\n        <button class=\\\"io-btn\\\" id=\\\"importJsonBtn\\\" title=\\\"從 JSON 還原字型與設定\\\">↥ 匯入 JSON<\\/button>\\n      <\\/div>\\n      <div class=\\\"sb-count\\\" id=\\\"count\\\">0 fonts<\\/div>\\n    <\\/div>\\n  <\\/aside>\\n\\n  <!-- ============ MAIN ============ -->\\n  <div class=\\\"main\\\" id=\\\"main\\\">\\n    <div class=\\\"drop-hint\\\" id=\\\"dropHint\\\"><span>放開以載入字型 ⌖<\\/span><\\/div>\\n\\n    <!-- topbar controls -->\\n    <div class=\\\"topbar\\\" id=\\\"topbar\\\">\\n      <div class=\\\"ctrl\\\">\\n        <label>尺寸 <span class=\\\"val\\\" id=\\\"sizeval\\\">96px<\\/span><\\/label>\\n        <input type=\\\"range\\\" id=\\\"size\\\" min=\\\"24\\\" max=\\\"220\\\" value=\\\"96\\\">\\n      <\\/div>\\n      <div class=\\\"ctrl\\\">\\n        <label>字重 <span class=\\\"val\\\" id=\\\"weightval\\\">400<\\/span><\\/label>\\n        <input type=\\\"range\\\" id=\\\"weight\\\" min=\\\"100\\\" max=\\\"900\\\" step=\\\"100\\\" value=\\\"400\\\">\\n      <\\/div>\\n      <div class=\\\"ctrl\\\">\\n        <label>字距 <span class=\\\"val\\\" id=\\\"trackval\\\">0<\\/span><\\/label>\\n        <input type=\\\"range\\\" id=\\\"track\\\" min=\\\"-5\\\" max=\\\"20\\\" value=\\\"0\\\">\\n      <\\/div>\\n      <div class=\\\"ctrl\\\">\\n        <label>樣張語系<\\/label>\\n        <div class=\\\"seg\\\" id=\\\"langseg\\\">\\n          <button class=\\\"on\\\" data-lang=\\\"latin\\\">Latin<\\/button>\\n          <button data-lang=\\\"han\\\">中文<\\/button>\\n        <\\/div>\\n      <\\/div>\\n      <div class=\\\"ctrl ctrl-wide\\\">\\n        <label>PNG 配色<\\/label>\\n        <div class=\\\"seg\\\" id=\\\"bgseg\\\">\\n          <button class=\\\"on\\\" data-combo=\\\"white-black\\\">白底黑字<\\/button>\\n          <button data-combo=\\\"black-white\\\">黑底白字<\\/button>\\n          <button data-combo=\\\"transparent-black\\\">透明黑字<\\/button>\\n          <button data-combo=\\\"transparent-white\\\">透明白字<\\/button>\\n        <\\/div>\\n      <\\/div>\\n      <div class=\\\"ctrl\\\">\\n        <label>PNG 解析度<\\/label>\\n        <div class=\\\"seg\\\" id=\\\"scaleseg\\\">\\n          <button data-scale=\\\"1\\\">1×<\\/button>\\n          <button class=\\\"on\\\" data-scale=\\\"2\\\">2×<\\/button>\\n          <button data-scale=\\\"3\\\">3×<\\/button>\\n        <\\/div>\\n      <\\/div>\\n    <\\/div>\\n\\n    <!-- welcome -->\\n    <div class=\\\"welcome\\\" id=\\\"welcome\\\">\\n      <div class=\\\"mark\\\">⌖<\\/div>\\n      <h1>把字型檔丟進來<\\/h1>\\n      <p>拖放到此處 · 或從左下角載入 · 可一次多個檔<\\/p>\\n      <div class=\\\"formats\\\">\\n        <span class=\\\"chip\\\">otf<\\/span><span class=\\\"chip\\\">ttf<\\/span>\\n        <span class=\\\"chip\\\">woff<\\/span><span class=\\\"chip\\\">woff2<\\/span>\\n      <\\/div>\\n      <button class=\\\"big-btn\\\" id=\\\"welcomeBtn\\\">選擇檔案<\\/button>\\n    <\\/div>\\n\\n    <!-- specimen -->\\n    <div class=\\\"specimen-area\\\" id=\\\"area\\\"><\\/div>\\n  <\\/div>\\n<\\/div>\\n\\n<!-- 字符放大檢視 -->\\n<div class=\\\"glyph-modal\\\" id=\\\"glyphModal\\\">\\n  <div class=\\\"gm-backdrop\\\" id=\\\"gmBackdrop\\\"><\\/div>\\n  <div class=\\\"gm-panel\\\">\\n    <div class=\\\"gm-head\\\">\\n      <div class=\\\"gm-info\\\">\\n        <span class=\\\"gm-title\\\" id=\\\"gmTitle\\\">放大檢視<\\/span>\\n        <span class=\\\"gm-sub\\\" id=\\\"gmSub\\\"><\\/span>\\n      <\\/div>\\n      <div class=\\\"gm-zoom seg\\\" id=\\\"gmZoom\\\">\\n        <button data-zoom=\\\"10\\\" class=\\\"on\\\">10×<\\/button>\\n        <button data-zoom=\\\"15\\\">15×<\\/button>\\n      <\\/div>\\n      <button class=\\\"gm-close\\\" id=\\\"gmClose\\\" title=\\\"關閉\\\">×<\\/button>\\n    <\\/div>\\n    <div class=\\\"gm-stage\\\" id=\\\"gmStage\\\">\\n      <button class=\\\"gm-nav gm-prev\\\" id=\\\"gmPrev\\\" title=\\\"上一個字 (←)\\\">‹<\\/button>\\n      <div class=\\\"gm-canvas\\\" id=\\\"gmCanvas\\\"><div class=\\\"gm-glyph\\\" id=\\\"gmGlyph\\\"><\\/div><\\/div>\\n      <button class=\\\"gm-nav gm-next\\\" id=\\\"gmNext\\\" title=\\\"下一個字 (→)\\\">›<\\/button>\\n    <\\/div>\\n  <\\/div>\\n<\\/div>\\n\\n<script>\\nconst SAMPLES = {\\n  latin: {\\n    hero: \\\"Typography\\\",\\n    ramp: [\\\"The quick brown fox\\\", \\\"jumps over the lazy dog\\\", \\\"Hamburgefonstiv\\\", \\\"Specimen\\\", \\\"Aa\\\"],\\n    para: \\\"In the quiet hours of the morning, the designer studies the curve of a single letter — the tension in its stroke, the breath of its counters, the way a serif lands like a footnote. Good type is invisible until you look closely, and then it is everything.\\\",\\n    glyphs: \\\"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789&@?!#$%\\\".split(\\\"\\\"),\\n    nameSample: \\\"Aa\\\"\\n  },\\n  han: {\\n    hero: \\\"字型之美\\\",\\n    ramp: [\\\"天地玄黃 宇宙洪荒\\\", \\\"山川異域 風月同天\\\", \\\"永字八法\\\", \\\"字體\\\", \\\"永\\\"],\\n    para: \\\"在清晨安靜的時刻，設計師端詳一個字的輪廓——筆畫之間的張力、字腔的呼吸、勾捺收尾的節奏。好的字型在你細看之前都是隱形的，而當你凝視它時，它便是一切。橫平豎直，撇捺有致。\\\",\\n    glyphs: \\\"永東國愛字型書道筆墨紙硯春夏秋冬山水雲風花鳥月日天地人和美善真心安寧靜思學問道德文章詩詞歌賦一二三四五六七八九十\\\".split(\\\"\\\"),\\n    nameSample: \\\"永字\\\"\\n  }\\n};\\n\\nlet seq = 0;\\nlet activeId = null;\\nlet currentLang = \\\"latin\\\";\\nconst fonts = []; // {id, family, name, ext}\\n\\nconst fileInput = document.getElementById('file');\\nconst sbList = document.getElementById('sbList');\\nconst sbEmpty = document.getElementById('sbEmpty');\\nconst area = document.getElementById('area');\\nconst welcome = document.getElementById('welcome');\\nconst topbar = document.getElementById('topbar');\\nconst main = document.getElementById('main');\\nconst dropHint = document.getElementById('dropHint');\\n\\ndocument.getElementById('addBtn').addEventListener('click', () => fileInput.click());\\ndocument.getElementById('welcomeBtn').addEventListener('click', () => fileInput.click());\\nfileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value=''; });\\n\\n// drag over whole main\\nlet dragDepth = 0;\\n['dragenter','dragover'].forEach(e => main.addEventListener(e, ev => {\\n  ev.preventDefault(); dragDepth++; dropHint.classList.add('show');\\n}));\\n['dragleave'].forEach(e => main.addEventListener(e, ev => {\\n  ev.preventDefault(); dragDepth--; if (dragDepth<=0) dropHint.classList.remove('show');\\n}));\\nmain.addEventListener('drop', ev => {\\n  ev.preventDefault(); dragDepth=0; dropHint.classList.remove('show');\\n  handleFiles(ev.dataTransfer.files);\\n});\\n\\nasync function handleFiles(fileList) {\\n  const files = [...fileList].filter(f => /\\\\.(otf|ttf|woff2?|ttc)$/i.test(f.name));\\n  if (!files.length) return;\\n\\n  // 並行載入全部檔案，個別失敗不影響其他\\n  const results = await Promise.allSettled(files.map(loadFont));\\n\\n  const failed = [];\\n  results.forEach((r, i) => { if (r.status === 'rejected') failed.push(files[i].name); });\\n\\n  renderSidebar();\\n  updateCount();\\n  // 自動選取本批第一個成功載入的字型\\n  const firstOk = fonts[fonts.length - results.filter(r=>r.status==='fulfilled').length];\\n  if (firstOk) selectFont(firstOk.id);\\n  else if (activeId) selectFont(activeId);\\n\\n  if (failed.length) {\\n    alert(`以下檔案無法載入（可能格式損毀或不支援）：\\\\n` + failed.join('\\\\n'));\\n  }\\n}\\n\\nasync function loadFont(file) {\\n  const id = ++seq;\\n  const family = `uf-${id}`;\\n  const buf = await file.arrayBuffer();\\n  const ff = new FontFace(family, buf);\\n  await ff.load();              // 失敗會 throw → Promise.allSettled 接住\\n  document.fonts.add(ff);\\n  fonts.push({\\n    id, family,\\n    name: file.name.replace(/\\\\.[^.]+$/, ''),\\n    ext: file.name.split('.').pop().toUpperCase(),\\n    b64: abToBase64(buf),                          // 供 JSON 封存\\n    mime: extToMime(file.name.split('.').pop())\\n  });\\n}\\n\\nfunction abToBase64(buf) {\\n  let bin = '';\\n  const bytes = new Uint8Array(buf);\\n  const chunk = 0x8000;\\n  for (let i = 0; i < bytes.length; i += chunk) {\\n    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));\\n  }\\n  return btoa(bin);\\n}\\nfunction base64ToAb(b64) {\\n  const bin = atob(b64);\\n  const bytes = new Uint8Array(bin.length);\\n  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);\\n  return bytes.buffer;\\n}\\nfunction extToMime(ext) {\\n  ext = (ext || '').toLowerCase();\\n  return ext === 'otf' ? 'font/otf'\\n       : ext === 'woff' ? 'font/woff'\\n       : ext === 'woff2' ? 'font/woff2'\\n       : ext === 'ttc' ? 'font/collection'\\n       : 'font/ttf';\\n}\\n\\nfunction updateCount() {\\n  document.getElementById('count').textContent = `${fonts.length} font${fonts.length>1?'s':''}`;\\n  const ej = document.getElementById('exportJsonBtn');\\n  if (ej) ej.disabled = fonts.length === 0;\\n}\\n\\nfunction renderSidebar() {\\n  sbEmpty.style.display = fonts.length ? 'none' : 'block';\\n  // remove existing items\\n  [...sbList.querySelectorAll('.font-item')].forEach(n => n.remove());\\n  fonts.forEach((f, i) => {\\n    const item = document.createElement('div');\\n    item.className = 'font-item' + (f.id===activeId ? ' active' : '');\\n    item.dataset.id = f.id;\\n    let previewHtml;\\n    if (f.kind === 'glyphs') {\\n      // 手寫檔：用第一張字符 PNG 當縮圖\\n      const firstPng = Object.values(f.glyphs)[0];\\n      previewHtml = `<span class=\\\"fi-glyph-thumb\\\"><img src=\\\"${firstPng}\\\" alt=\\\"\\\"><\\/span>${f.name}`;\\n    } else {\\n      previewHtml = `<span style=\\\"font-family:'${f.family}'\\\">${SAMPLES[currentLang].nameSample} ${f.name}<\\/span>`;\\n    }\\n    item.innerHTML = `\\n      <span class=\\\"fi-num\\\">${String(i+1).padStart(2,'0')}<\\/span>\\n      <div class=\\\"fi-body\\\">\\n        <div class=\\\"fi-preview\\\">${previewHtml}<\\/div>\\n        <div class=\\\"fi-meta\\\">${f.kind === 'glyphs' ? `手寫 · ${f.glyphCount} 字` : f.ext}<\\/div>\\n      <\\/div>\\n      <button class=\\\"fi-del\\\" title=\\\"移除\\\">×<\\/button>\\n    `;\\n    item.addEventListener('click', e => {\\n      if (e.target.classList.contains('fi-del')) { removeFont(f.id); return; }\\n      selectFont(f.id);\\n    });\\n    sbList.appendChild(item);\\n  });\\n}\\n\\nfunction removeFont(id) {\\n  const idx = fonts.findIndex(f => f.id===id);\\n  if (idx<0) return;\\n  fonts.splice(idx,1);\\n  if (activeId===id) {\\n    activeId = fonts.length ? fonts[Math.max(0,idx-1)].id : null;\\n  }\\n  renderSidebar();\\n  updateCount();\\n  if (activeId) selectFont(activeId);\\n  else showWelcome();\\n}\\n\\nfunction showWelcome() {\\n  welcome.style.display = 'flex';\\n  area.classList.remove('show');\\n  topbar.classList.remove('show');\\n}\\n\\nfunction selectFont(id) {\\n  activeId = id;\\n  const font = fonts.find(f => f.id===id);\\n  if (!font) return;\\n  welcome.style.display = 'none';\\n  area.classList.add('show');\\n  topbar.classList.add('show');\\n  renderSidebar();\\n  renderSpecimen(font);\\n}\\n\\nfunction renderSpecimen(font) {\\n  if (font.kind === 'glyphs') { renderGlyphsSpecimen(font); return; }\\n  const s = SAMPLES[currentLang];\\n  const idx = fonts.findIndex(f => f.id===font.id) + 1;\\n  area.innerHTML = `\\n    <div class=\\\"area-pad\\\">\\n      <div class=\\\"fontname-bar\\\">\\n        <span class=\\\"num\\\">${String(idx).padStart(2,'0')}<\\/span>\\n        <span class=\\\"nm\\\" style=\\\"--pv:'${font.family}'\\\">${font.name}<\\/span>\\n        <span class=\\\"fmt\\\">${font.ext}<\\/span>\\n      <\\/div>\\n\\n      <div class=\\\"block\\\">\\n        <div class=\\\"tag-row\\\">\\n          <span class=\\\"tag\\\">Display · 點擊文字可即時編輯<\\/span>\\n          <button class=\\\"export-btn\\\" data-target=\\\"hero\\\">↧ 輸出 PNG<\\/button>\\n        <\\/div>\\n        <div class=\\\"pv hero-line editable\\\" contenteditable=\\\"true\\\" style=\\\"--pv:'${font.family}'\\\" data-role=\\\"hero\\\">${s.hero}<\\/div>\\n      <\\/div>\\n\\n      <div class=\\\"block\\\">\\n        <div class=\\\"tag\\\">Size Ramp<\\/div>\\n        <div class=\\\"pv ramp\\\" style=\\\"--pv:'${font.family}'\\\">\\n          <div class=\\\"r1\\\">${s.ramp[0]}<\\/div>\\n          <div class=\\\"r2\\\">${s.ramp[1]}<\\/div>\\n          <div class=\\\"r3\\\">${s.ramp[2]}<\\/div>\\n          <div class=\\\"r4\\\">${s.ramp[3]}<\\/div>\\n          <div class=\\\"r5\\\">${s.ramp[4]}<\\/div>\\n        <\\/div>\\n      <\\/div>\\n\\n      <div class=\\\"block\\\">\\n        <div class=\\\"tag-row\\\">\\n          <span class=\\\"tag\\\">Paragraph · 19px · 可編輯<\\/span>\\n          <button class=\\\"export-btn\\\" data-target=\\\"para\\\">↧ 輸出 PNG<\\/button>\\n        <\\/div>\\n        <div class=\\\"pv paragraph editable\\\" contenteditable=\\\"true\\\" style=\\\"--pv:'${font.family}'\\\" data-role=\\\"para\\\">${s.para}<\\/div>\\n      <\\/div>\\n\\n      <div class=\\\"block\\\">\\n        <div class=\\\"tag\\\" id=\\\"glyphTag\\\"><\\/div>\\n        <div class=\\\"glyphgrid\\\" id=\\\"glyphGrid\\\" style=\\\"--pv:'${font.family}'\\\"><\\/div>\\n        <button class=\\\"export-btn\\\" id=\\\"glyphMore\\\" style=\\\"display:none;margin-top:14px\\\">顯示更多 ↓<\\/button>\\n      <\\/div>\\n    <\\/div>\\n  `;\\n  applyControls();\\n  // 綁定匯出按鈕\\n  area.querySelectorAll('.export-btn').forEach(btn => {\\n    btn.addEventListener('click', () => {\\n      const role = btn.dataset.target;\\n      const el = area.querySelector(`[data-role=\\\"${role}\\\"]`);\\n      exportPng(el, font, role, btn);\\n    });\\n  });\\n  // 字符來源：同步進度字型 → 「已寫字符・備用區」；一般字型 → 樣本字符表\\n  const glyphSrc=(font.chars&&font.chars.length)?font.chars:s.glyphs;\\n  const isLive=!!(font.chars&&font.chars.length);\\n  area.querySelector('#glyphTag').textContent=isLive\\n    ? ('已寫字符・備用區 · '+glyphSrc.length+' 字 · 點任一字放大檢視')\\n    : 'Glyph Set · 點任一字放大檢視';\\n  const gGrid=area.querySelector('#glyphGrid');\\n  const gMore=area.querySelector('#glyphMore');\\n  const G_CHUNK=600; let gShown=0;\\n  function gAppend(){\\n    const frag=document.createDocumentFragment();\\n    const end=Math.min(glyphSrc.length,gShown+G_CHUNK);\\n    for(let i=gShown;i<end;i++){const sp=document.createElement('span');sp.textContent=glyphSrc[i];frag.appendChild(sp);}\\n    gShown=end; gGrid.appendChild(frag);\\n    gMore.style.display=gShown<glyphSrc.length?'':'none';\\n    gMore.textContent='顯示更多字符 ↓（'+gShown+' / '+glyphSrc.length+'）';\\n  }\\n  gAppend();\\n  gMore.onclick=gAppend;\\n  gGrid.addEventListener('click',e=>{\\n    if(e.target.tagName!=='SPAN')return;\\n    const kids=[...gGrid.children];\\n    openGlyphModal(kids.map(sp=>sp.textContent),kids.indexOf(e.target),font);\\n  });\\n}\\n\\n// 手寫造字檔的預覽：字符 PNG 網格（無法打字排版，故以字符表呈現）\\nfunction renderGlyphsSpecimen(font) {\\n  const idx = fonts.findIndex(f => f.id===font.id) + 1;\\n  const entries = Object.entries(font.glyphs)\\n    .sort((a,b) => a[0].codePointAt(0) - b[0].codePointAt(0));\\n  const cells = entries.map(([ch, png]) => `\\n    <div class=\\\"hg-cell\\\">\\n      <div class=\\\"hg-img\\\"><img src=\\\"${png}\\\" alt=\\\"${ch}\\\"><\\/div>\\n      <div class=\\\"hg-label\\\">${ch === ' ' ? '␠' : ch}<\\/div>\\n    <\\/div>`).join('');\\n  area.innerHTML = `\\n    <div class=\\\"area-pad\\\">\\n      <div class=\\\"fontname-bar\\\">\\n        <span class=\\\"num\\\">${String(idx).padStart(2,'0')}<\\/span>\\n        <span class=\\\"nm\\\">${font.name}<\\/span>\\n        <span class=\\\"fmt\\\">手寫 · ${font.ext}<\\/span>\\n      <\\/div>\\n\\n      <div class=\\\"block\\\">\\n        <div class=\\\"tag\\\">手寫造字檔 · ${font.glyphCount} 個字符${font.zhName ? ' · ' + font.zhName : ''}<\\/div>\\n        <p class=\\\"hg-note\\\">這是手寫造字檔，每個字符是一張獨立的手寫圖，無法像字型一樣自由打字排版，因此以字符表呈現。可點任一字符輸出該字的 PNG。<\\/p>\\n      <\\/div>\\n\\n      <div class=\\\"block\\\">\\n        <div class=\\\"tag\\\">Glyph Sheet<\\/div>\\n        <div class=\\\"handglyph-grid\\\">${cells}<\\/div>\\n      <\\/div>\\n    <\\/div>\\n  `;\\n  // 點字符 → 下載該字 PNG\\n  area.querySelectorAll('.hg-cell').forEach((cell, i) => {\\n    cell.addEventListener('click', () => {\\n      const [ch, png] = entries[i];\\n      const a = document.createElement('a');\\n      a.href = png;\\n      const cp = ch.codePointAt(0).toString(16);\\n      a.download = `${font.name}_u${cp}.png`;\\n      document.body.appendChild(a); a.click(); document.body.removeChild(a);\\n    });\\n  });\\n}\\n\\n// ---- controls ----\\nconst sizeI = document.getElementById('size');\\nconst weightI = document.getElementById('weight');\\nconst trackI = document.getElementById('track');\\nfunction applyControls() {\\n  document.documentElement.style.setProperty('--size', sizeI.value + 'px');\\n  document.documentElement.style.setProperty('--weight', weightI.value);\\n  document.documentElement.style.setProperty('--track', (trackI.value/100) + 'em');\\n  document.getElementById('sizeval').textContent = sizeI.value + 'px';\\n  document.getElementById('weightval').textContent = weightI.value;\\n  document.getElementById('trackval').textContent = (trackI.value>0?'+':'') + trackI.value;\\n}\\n[sizeI, weightI, trackI].forEach(i => i.addEventListener('input', applyControls));\\n\\n// ---- language toggle ----\\ndocument.getElementById('langseg').addEventListener('click', e => {\\n  if (!e.target.dataset.lang) return;\\n  [...e.currentTarget.children].forEach(b => b.classList.remove('on'));\\n  e.target.classList.add('on');\\n  currentLang = e.target.dataset.lang;\\n  renderSidebar();\\n  if (activeId) renderSpecimen(fonts.find(f=>f.id===activeId));\\n});\\n\\n// ---- 字符放大檢視 ----\\nconst glyphModal = document.getElementById('glyphModal');\\nconst gmGlyph = document.getElementById('gmGlyph');\\nconst gmTitle = document.getElementById('gmTitle');\\nconst gmSub = document.getElementById('gmSub');\\nconst gmStage = document.getElementById('gmStage');\\nconst gmPrev = document.getElementById('gmPrev');\\nconst gmNext = document.getElementById('gmNext');\\nlet gmState = { list: [], index: 0, family: '', zoom: 10 };\\nconst GM_BASE = 28; // glyphgrid 基準字級，10×=280px\\n\\nfunction openGlyphModal(list, index, font) {\\n  if (!list || !list.length) return;\\n  gmState.list = list;\\n  gmState.index = index;\\n  gmState.family = font.family;\\n  gmState.zoom = 10;\\n  document.querySelectorAll('#gmZoom button').forEach(b =>\\n    b.classList.toggle('on', +b.dataset.zoom === 10));\\n  applyGlyphZoom();\\n  glyphModal.classList.add('show');\\n}\\n\\nfunction navGlyph(delta) {\\n  const n = gmState.list.length;\\n  const ni = gmState.index + delta;\\n  if (ni < 0 || ni >= n) return;     // 不循環，到頭/尾停住\\n  gmState.index = ni;\\n  applyGlyphZoom();                  // 保留目前縮放倍率，只換字\\n}\\n\\nfunction applyGlyphZoom() {\\n  const ch = gmState.list[gmState.index];\\n  const cp = ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');\\n  gmGlyph.textContent = ch;\\n  gmGlyph.style.setProperty('--pv', `'${gmState.family}'`);\\n  gmGlyph.style.fontSize = (GM_BASE * gmState.zoom) + 'px';\\n  gmTitle.textContent = `「${ch}」`;\\n  gmSub.textContent = `U+${cp} · ${gmState.zoom}× (${GM_BASE * gmState.zoom}px) · ${gmState.index + 1}/${gmState.list.length}`;\\n  // 頭/尾時停用對應按鈕\\n  gmPrev.disabled = gmState.index === 0;\\n  gmNext.disabled = gmState.index === gmState.list.length - 1;\\n  // 放大後置中捲動\\n  requestAnimationFrame(() => {\\n    gmStage.scrollLeft = (gmStage.scrollWidth - gmStage.clientWidth) / 2;\\n    gmStage.scrollTop = (gmStage.scrollHeight - gmStage.clientHeight) / 2;\\n  });\\n}\\n\\nfunction closeGlyphModal() { glyphModal.classList.remove('show'); }\\n\\ndocument.getElementById('gmZoom').addEventListener('click', e => {\\n  if (!e.target.dataset.zoom) return;\\n  [...e.currentTarget.children].forEach(b => b.classList.remove('on'));\\n  e.target.classList.add('on');\\n  gmState.zoom = +e.target.dataset.zoom;\\n  applyGlyphZoom();\\n});\\ngmPrev.addEventListener('click', () => navGlyph(-1));\\ngmNext.addEventListener('click', () => navGlyph(1));\\ndocument.getElementById('gmClose').addEventListener('click', closeGlyphModal);\\ndocument.getElementById('gmBackdrop').addEventListener('click', closeGlyphModal);\\ndocument.addEventListener('keydown', e => {\\n  if (!glyphModal.classList.contains('show')) return;\\n  if (e.key === 'Escape') closeGlyphModal();\\n  else if (e.key === 'ArrowLeft') navGlyph(-1);\\n  else if (e.key === 'ArrowRight') navGlyph(1);\\n});\\n\\n// ---- JSON 封存：匯出 / 匯入 ----\\nconst exportJsonBtn = document.getElementById('exportJsonBtn');\\nconst importJsonBtn = document.getElementById('importJsonBtn');\\nconst jsonFile = document.getElementById('jsonFile');\\n\\nfunction refreshJsonBtnState() {\\n  exportJsonBtn.disabled = fonts.length === 0;\\n}\\n\\nexportJsonBtn.addEventListener('click', () => {\\n  if (!fonts.length) return;\\n  const original = exportJsonBtn.textContent;\\n  exportJsonBtn.textContent = '打包中…';\\n  exportJsonBtn.disabled = true;\\n  try {\\n    const pkg = {\\n      app: '字型試演所',\\n      version: '1.1',\\n      exportedAt: new Date().toISOString(),\\n      settings: {\\n        lang: currentLang,\\n        size: +sizeI.value,\\n        weight: +weightI.value,\\n        track: +trackI.value,\\n        combo: exportCombo,\\n        scale: exportScale,\\n      },\\n      // 字型存 base64；手寫造字檔存 glyphs 圖\\n      fonts: fonts.map(f => f.kind === 'glyphs'\\n        ? { kind: 'glyphs', name: f.name, ext: f.ext, zhName: f.zhName || '',\\n            glyphs: Object.fromEntries(Object.entries(f.glyphs).map(\\n              ([ch, png]) => ['u' + ch.codePointAt(0).toString(16), { png }])) }\\n        : { kind: 'font', name: f.name, ext: f.ext, mime: f.mime, data: f.b64 }\\n      ),\\n    };\\n    const blob = new Blob([JSON.stringify(pkg)], { type: 'application/json' });\\n    const url = URL.createObjectURL(blob);\\n    const a = document.createElement('a');\\n    const stamp = new Date().toISOString().slice(0,10);\\n    a.href = url;\\n    a.download = `typespecimen_${fonts.length}fonts_${stamp}.json`;\\n    document.body.appendChild(a);\\n    a.click();\\n    document.body.removeChild(a);\\n    setTimeout(() => URL.revokeObjectURL(url), 60000);\\n    exportJsonBtn.textContent = '✓ 已匯出';\\n  } catch (err) {\\n    console.error(err);\\n    alert('匯出 JSON 失敗：' + err.message);\\n    exportJsonBtn.textContent = original;\\n  }\\n  setTimeout(() => { exportJsonBtn.textContent = original; refreshJsonBtnState(); }, 1600);\\n});\\n\\nimportJsonBtn.addEventListener('click', () => jsonFile.click());\\njsonFile.addEventListener('change', async e => {\\n  const file = e.target.files[0];\\n  jsonFile.value = '';\\n  if (!file) return;\\n  const original = importJsonBtn.textContent;\\n  importJsonBtn.textContent = '還原中…';\\n  importJsonBtn.disabled = true;\\n  try {\\n    const pkg = JSON.parse(await file.text());\\n\\n    let ok = 0;\\n    const failed = [];\\n\\n    // 格式 A：字型試演所封存檔（有 fonts 陣列，可含字型或手寫項目）\\n    if (pkg && Array.isArray(pkg.fonts)) {\\n      for (const fd of pkg.fonts) {\\n        try {\\n          if (fd.kind === 'glyphs' && fd.glyphs) {\\n            // 陣列裡的手寫造字項目\\n            const glyphMap = {};\\n            let c = 0;\\n            for (const [key, val] of Object.entries(fd.glyphs)) {\\n              const m = /^u([0-9a-fA-F]+)$/.exec(key);\\n              const png = val && (val.png || val);\\n              if (!m || typeof png !== 'string') continue;\\n              glyphMap[String.fromCodePoint(parseInt(m[1],16))] = png;\\n              c++;\\n            }\\n            if (!c) throw new Error('手寫項目沒有字符');\\n            fonts.push({\\n              id: ++seq, kind: 'glyphs',\\n              name: fd.name || `glyphs-${seq}`,\\n              ext: (fd.ext || 'GLYPHS').toUpperCase(),\\n              glyphs: glyphMap, glyphCount: c, zhName: fd.zhName || '',\\n            });\\n            ok++;\\n            continue;\\n          }\\n          if (!fd.data) throw new Error('缺少字型資料');\\n          const id = ++seq;\\n          const family = `uf-${id}`;\\n          const buf = base64ToAb(fd.data);\\n          const ff = new FontFace(family, buf);\\n          await ff.load();\\n          document.fonts.add(ff);\\n          fonts.push({\\n            id, family, kind: 'font',\\n            name: fd.name || `font-${id}`,\\n            ext: (fd.ext || 'TTF').toUpperCase(),\\n            b64: fd.data,\\n            mime: fd.mime || extToMime(fd.ext),\\n          });\\n          ok++;\\n        } catch (err) {\\n          failed.push(fd.name || '(未命名)');\\n        }\\n      }\\n      restoreSettings(pkg.settings || {});\\n    }\\n    // 格式 B：手寫造字檔（有 glyphs 物件，每個字是一張 PNG 圖）\\n    else if (pkg && pkg.glyphs && typeof pkg.glyphs === 'object') {\\n      const gs = pkg.glyphs;\\n      const glyphMap = {};\\n      let count = 0;\\n      for (const key of Object.keys(gs)) {\\n        // key 形如 u41 → Unicode code point\\n        const m = /^u([0-9a-fA-F]+)$/.exec(key);\\n        if (!m) continue;\\n        const png = gs[key] && (gs[key].png || gs[key]);\\n        if (typeof png !== 'string' || !png.startsWith('data:image')) continue;\\n        const ch = String.fromCodePoint(parseInt(m[1], 16));\\n        glyphMap[ch] = png;\\n        count++;\\n      }\\n      if (!count) throw new Error('手寫檔內沒有可用的字符圖');\\n      const id = ++seq;\\n      const st = pkg.settings || {};\\n      const name = st.enName || st.zhName || file.name.replace(/\\\\.[^.]+$/, '');\\n      fonts.push({\\n        id, kind: 'glyphs',\\n        name,\\n        ext: (st.fmt || 'GLYPHS').toUpperCase(),\\n        glyphs: glyphMap,\\n        glyphCount: count,\\n        zhName: st.zhName || '',\\n      });\\n      ok = 1;\\n    }\\n    else {\\n      throw new Error('無法辨識的 JSON 格式（既非字型封存檔，也非手寫造字檔）');\\n    }\\n\\n    applyControls();\\n    renderSidebar();\\n    updateCount();\\n    refreshJsonBtnState();\\n    if (ok) selectFont(fonts[fonts.length - ok].id);\\n\\n    if (failed.length) alert(`部分字型無法還原：\\\\n${failed.join('\\\\n')}`);\\n  } catch (err) {\\n    console.error(err);\\n    alert('匯入 JSON 失敗：' + err.message);\\n  }\\n  importJsonBtn.textContent = original;\\n  importJsonBtn.disabled = false;\\n});\\n\\n// 還原字型封存檔的設定（手寫檔不套用這些）\\nfunction restoreSettings(s) {\\n  if (s.lang && SAMPLES[s.lang]) {\\n    currentLang = s.lang;\\n    document.querySelectorAll('#langseg button').forEach(b =>\\n      b.classList.toggle('on', b.dataset.lang === currentLang));\\n  }\\n  if (Number.isFinite(s.size))   sizeI.value = s.size;\\n  if (Number.isFinite(s.weight)) weightI.value = s.weight;\\n  if (Number.isFinite(s.track))  trackI.value = s.track;\\n  if (s.combo && COMBOS[s.combo]) {\\n    exportCombo = s.combo;\\n    document.querySelectorAll('#bgseg button').forEach(b =>\\n      b.classList.toggle('on', b.dataset.combo === exportCombo));\\n  }\\n  if ([1,2,3].includes(s.scale)) {\\n    exportScale = s.scale;\\n    document.querySelectorAll('#scaleseg button').forEach(b =>\\n      b.classList.toggle('on', +b.dataset.scale === exportScale));\\n  }\\n}\\n\\n// ---- export options ----\\nlet exportCombo = 'white-black';\\nlet exportScale = 2;\\n// 每個配色 = { bg: 背景色或 null(透明), ink: 文字色 }\\nconst COMBOS = {\\n  'white-black':       { bg: '#ffffff', ink: '#16130f' },\\n  'black-white':       { bg: '#16130f', ink: '#ffffff' },\\n  'transparent-black': { bg: null,      ink: '#16130f' },\\n  'transparent-white': { bg: null,      ink: '#ffffff' },\\n};\\n\\ndocument.getElementById('bgseg').addEventListener('click', e => {\\n  if (!e.target.dataset.combo) return;\\n  [...e.currentTarget.children].forEach(b => b.classList.remove('on'));\\n  e.target.classList.add('on');\\n  exportCombo = e.target.dataset.combo;\\n});\\ndocument.getElementById('scaleseg').addEventListener('click', e => {\\n  if (!e.target.dataset.scale) return;\\n  [...e.currentTarget.children].forEach(b => b.classList.remove('on'));\\n  e.target.classList.add('on');\\n  exportScale = parseInt(e.target.dataset.scale, 10);\\n});\\n\\n// ---- 文字轉 PNG ----\\n// 依量測寬度換行：中日韓逐字斷，拉丁逐詞斷\\nfunction wrapText(text, maxW, measure) {\\n  const out = [];\\n  for (const para of text.split('\\\\n')) {\\n    if (!para) { out.push(''); continue; }\\n    // 切成「詞或單字」token：CJK 每字一 token，其餘照空白切\\n    const tokens = para.match(/[\\\\u3000-\\\\u9fff\\\\uf900-\\\\ufaff]|[^\\\\s\\\\u3000-\\\\u9fff\\\\uf900-\\\\ufaff]+\\\\s*/g) || [para];\\n    let line = '';\\n    for (const tk of tokens) {\\n      const trial = line + tk;\\n      if (line && measure(trial.trimEnd()) > maxW) {\\n        out.push(line.trimEnd());\\n        line = tk;\\n      } else {\\n        line = trial;\\n      }\\n    }\\n    if (line.trim()) out.push(line.trimEnd());\\n  }\\n  return out.length ? out : [text];\\n}\\n\\nasync function exportPng(el, font, role, btn) {\\n  const original = btn.textContent;\\n  btn.textContent = '處理中…';\\n  btn.disabled = true;\\n  try {\\n    const text = el.innerText.replace(/\\\\u00a0/g, ' ');\\n    const cs = getComputedStyle(el);\\n    const fontSize = parseFloat(cs.fontSize);\\n    const fontWeight = cs.fontWeight;\\n    const lineHeight = parseFloat(cs.lineHeight) || fontSize * 1.3;\\n    const letterSpacing = cs.letterSpacing === 'normal' ? 0 : parseFloat(cs.letterSpacing) || 0;\\n    const padding = Math.round(fontSize * 0.5);\\n    const combo = COMBOS[exportCombo];\\n\\n    // 量測工具\\n    const measurer = document.createElement('span');\\n    measurer.style.cssText = `position:absolute;visibility:hidden;white-space:nowrap;font-family:'${font.family}';font-size:${fontSize}px;font-weight:${fontWeight};letter-spacing:${letterSpacing}px;`;\\n    document.body.appendChild(measurer);\\n    const measure = t => { measurer.textContent = t || ' '; return measurer.offsetWidth; };\\n\\n    // 段落(para)限制最大寬度並依字元換行；標題(hero)維持單/原始行\\n    let lines;\\n    if (role === 'para') {\\n      const maxLineW = Math.min(measure(text), 760);\\n      lines = wrapText(text, maxLineW, measure);\\n    } else {\\n      lines = text.split('\\\\n');\\n      if (!lines.length) lines = [text];\\n    }\\n\\n    let maxW = 0;\\n    for (const ln of lines) maxW = Math.max(maxW, measure(ln));\\n    document.body.removeChild(measurer);\\n\\n    const contentW = Math.ceil(maxW) + Math.abs(letterSpacing) + 4; // 字距/抗鋸齒補償\\n    const contentH = Math.ceil(lineHeight * lines.length);\\n    const W = contentW + padding * 2;\\n    const H = contentH + padding * 2;\\n\\n    // 確保字型已就緒（canvas 需要字型載入完成才能正確繪製）\\n    await document.fonts.load(`${fontWeight} ${fontSize}px \\\"${font.family}\\\"`);\\n    await document.fonts.ready;\\n\\n    const canvas = document.createElement('canvas');\\n    canvas.width = W * exportScale;\\n    canvas.height = H * exportScale;\\n    const ctx = canvas.getContext('2d');\\n    ctx.scale(exportScale, exportScale);\\n\\n    // 背景\\n    if (combo.bg) { ctx.fillStyle = combo.bg; ctx.fillRect(0, 0, W, H); }\\n\\n    // 文字\\n    ctx.fillStyle = combo.ink;\\n    ctx.textBaseline = 'alphabetic';\\n    ctx.font = `${fontWeight} ${fontSize}px \\\"${font.family}\\\"`;\\n    if ('letterSpacing' in ctx) ctx.letterSpacing = `${letterSpacing}px`;\\n\\n    lines.forEach((ln, i) => {\\n      // baseline 落在每行行高的中央偏下\\n      const y = padding + lineHeight * i + lineHeight * 0.5 + fontSize * 0.34;\\n      if ('letterSpacing' in ctx || letterSpacing === 0) {\\n        ctx.fillText(ln, padding, y);\\n      } else {\\n        // 舊瀏覽器無 letterSpacing：逐字繪製模擬字距\\n        let x = padding;\\n        for (const ch of ln) {\\n          ctx.fillText(ch, x, y);\\n          x += ctx.measureText(ch).width + letterSpacing;\\n        }\\n      }\\n    });\\n\\n    const safeName = font.name.replace(/[^\\\\w\\\\u4e00-\\\\u9fa5-]/g, '_');\\n    const filename = `${safeName}_${role}_${exportScale}x.png`;\\n\\n    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));\\n    downloadBlob(blob, filename, btn, original);\\n  } catch (err) {\\n    console.error(err);\\n    alert('匯出失敗：' + err.message);\\n    btn.textContent = original;\\n    btn.disabled = false;\\n  }\\n}\\n\\n// 觸發下載。沙箱環境下 a.click() 可能靜默失敗，因此一律附帶「開新分頁」備援。\\nfunction downloadBlob(blob, filename, btn, original) {\\n  const url = URL.createObjectURL(blob);\\n\\n  // 主要路徑：<a download> 點擊\\n  const a = document.createElement('a');\\n  a.href = url;\\n  a.download = filename;\\n  document.body.appendChild(a);\\n  a.click();\\n  document.body.removeChild(a);\\n\\n  // 備援：直接開新分頁顯示圖片，使用者可長按／右鍵儲存。\\n  // 用 setTimeout 區隔，避免與上面的 click 衝突被瀏覽器當作彈窗攔截。\\n  btn.textContent = '✓ 已下載';\\n  showFallbackLink(url, filename, btn, original);\\n\\n  setTimeout(() => URL.revokeObjectURL(url), 120000);\\n}\\n\\nfunction showFallbackLink(url, filename, btn, original) {\\n  // 在按鈕後面插入一個小連結，沒真的下載到的人可以點這個\\n  const row = btn.parentElement;\\n  let link = row.querySelector('.fallback-link');\\n  if (!link) {\\n    link = document.createElement('a');\\n    link.className = 'fallback-link';\\n    link.target = '_blank';\\n    link.textContent = '沒下載到？點此開啟圖片';\\n    row.appendChild(link);\\n  }\\n  link.href = url;\\n  link.download = filename;\\n  link.style.display = 'inline';\\n  setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1600);\\n}\\n\\n// ==== 墨格 2.0 整合：嵌入模式，與創作端同步即時手寫字型 ====\\n(function(){\\n  if(window.parent===window) return;\\n  const syncBtn=document.getElementById('syncBtn');\\n  syncBtn.style.display='block';\\n  const resetBtn=()=>{ syncBtn.disabled=false; syncBtn.textContent='⟳ 同步手寫進度'; };\\n  syncBtn.addEventListener('click',()=>{\\n    syncBtn.disabled=true; syncBtn.textContent='同步中…';\\n    window.parent.postMessage({type:'moge-request-sync'},'*');\\n  });\\n  let liveFontId=null;\\n  window.addEventListener('message', async ev=>{\\n    const d=ev.data;\\n    if(!d||typeof d!=='object') return;\\n    if(d.type==='moge-sync-progress'){ syncBtn.disabled=true; syncBtn.textContent=d.msg||'同步中…'; return; }\\n    if(d.type==='moge-sync-done'){ resetBtn(); return; }\\n    if(d.type==='moge-live-font' && d.buf){\\n      try{\\n        if(liveFontId!=null){ const i=fonts.findIndex(f=>f.id===liveFontId); if(i>=0) fonts.splice(i,1); if(activeId===liveFontId) activeId=null; }\\n        const id=++seq, family='uf-'+id;\\n        const ff=new FontFace(family, d.buf);\\n        await ff.load(); document.fonts.add(ff);\\n        fonts.unshift({id, family, kind:'font',\\n          name:d.name||'手寫進度', ext:'LIVE',\\n          chars:Array.isArray(d.chars)?d.chars:null,\\n          b64:abToBase64(d.buf.buffer||d.buf), mime:'font/ttf'});\\n        liveFontId=id;\\n        if(currentLang!=='han'){\\n          currentLang='han';\\n          document.querySelectorAll('#langseg button').forEach(b=>b.classList.toggle('on',b.dataset.lang==='han'));\\n        }\\n        renderSidebar(); updateCount();\\n        selectFont(id);\\n      }catch(e){ console.error(e); alert('載入手寫進度失敗：'+e.message); }\\n      resetBtn();\\n    }\\n  });\\n  window.parent.postMessage({type:'tryon-ready'},'*');\\n})();\\n<\\/script>\\n<\\/body>\\n<\\/html>\\n\";\nlet tryonLoaded=false;\nfunction setMode(m){\n  document.body.classList.toggle('mode-tryon', m==='tryon');\n  $$('#modeTabs button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));\n  if(m==='tryon' && !tryonLoaded){\n    tryonLoaded=true;\n    $('#tryonFrame').srcdoc=TRYON_SRC;\n  }\n  if(m==='write') sizeCanvas();\n}\n$$('#modeTabs button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));\n\n// 試演 iframe ↔ 創作端：同步「目前手寫進度」組成即時字型\nwindow.addEventListener('message', ev=>{\n  const d=ev.data;\n  if(!d||typeof d!=='object') return;\n  if(d.type==='tryon-ready'){ if(written.size>0) syncToTryon(false); }\n  else if(d.type==='moge-request-sync') syncToTryon(true);\n});\nlet tryonSyncing=false;\nasync function syncToTryon(manual){\n  if(tryonSyncing) return;\n  const frame=$('#tryonFrame');\n  if(!frame||!frame.contentWindow) return;\n  const send=o=>{ try{ frame.contentWindow.postMessage(o,'*'); }catch(_){} };\n  tryonSyncing=true;\n  try{\n    await saveCurrentIfDirty();\n    if(written.size===0){ send({type:'moge-sync-done'}); if(manual) toast('還沒有任何字，先到「創作」寫幾個字吧'); return; }\n    send({type:'moge-sync-progress', msg:'收集筆跡…'});\n    const built=await assembleFont({\n      nameSuffix:'Live'+Date.now().toString().slice(-4),\n      onProgress:(dn,t)=>send({type:'moge-sync-progress', msg:'描繪字形 '+dn+'/'+t+'…'})\n    });\n    if(!built){ send({type:'moge-sync-done'}); return; }\n    let buf;\n    try{ buf=TTFWriter.build(built.ttfData); }\n    catch(e){ console.error(e); send({type:'moge-sync-done'}); toast('字數過多，無法一次組成試演字型'); return; }\n    const nm=(state.settings.zhName||state.settings.enName||'手寫')+'（進度 '+built.count+' 字）';\n    const charList=[...written].sort((a,b)=>a-b).map(cp=>String.fromCodePoint(cp));\n    send({type:'moge-live-font', name:nm, count:built.count, buf, chars:charList});\n  } finally { tryonSyncing=false; }\n}\n\n// ========== 墨格 2.0：備份輔助（檔名引導 / 待寫包完成 / 閒置提醒） ==========\nfunction backupFilename(){\n  const stamp=new Date().toISOString().slice(0,10).replace(/-/g,'');\n  return (state.settings.enName||'mogeh')+'-'+written.size+'字-'+stamp+'.json';\n}\nasync function markBackedUp(n){\n  backedUpCount=(n!=null?n:written.size);\n  lastBackupTs=Date.now();\n  idleReminded=false;\n  try{ await idbPut(META,'backup',{count:backedUpCount, ts:lastBackupTs}); }catch(_){}\n}\nconst remindedPacks=new Set();\nfunction maybeRemindPack(){\n  if(!state.batchSize||!batchBounds[state.batch]) return;\n  const [s,e]=batchBounds[state.batch];\n  if(writtenInRange(s,e)!==e-s) return;\n  const key=state.tier+'#'+state.batch+'#'+state.batchSize;\n  if(remindedPacks.has(key)) return;\n  remindedPacks.add(key);\n  showBackupReminder({kind:'pack', label:batchLabel(state.batch)});\n}\nlet lastActivityTs=Date.now(), idleReminded=false;\nconst IDLE_REMIND_MIN=5;   // 閒置 5 分鐘且有未備份進度時提醒\nfunction noteActivity(){ lastActivityTs=Date.now(); idleReminded=false; }\nsetInterval(()=>{\n  if(idleReminded || unbacked()<=0) return;\n  if(Date.now()-lastActivityTs < IDLE_REMIND_MIN*60000) return;\n  if($$('.scrim.show').length) return;   // 有視窗開著就不打擾\n  idleReminded=true;\n  showBackupReminder({kind:'idle'});\n},30000);\n\n// ---------- boot ----------\n// ---------- onboarding guide (shown every load) ----------\nconst GUIDE_STEPS=[\n  { emoji:'💌', title:'敬愛的使用者',\n    body:'歡迎使用 <span class=\"hl\">墨格 2.0<\u002Fspan> ✍️<br><br>'+\n         '2.0 把<b>創作<\u002Fb>與<span class=\"hl\">試演（字型檢視）<\u002Fspan>合而為一，頂部分頁隨時切換。<br><br>'+\n         '⚠️ 為避免創作量大時當機遺失，加入了<span class=\"hl\">自動存檔提醒<\u002Fspan>：寫滿一定字數、完成一個待寫包、儲存空間吃緊或閒置太久，都會提醒你先匯出 <b>.json<\u002Fb> 備份 💾' },\n  { emoji:'🖌️', title:'歡迎使用 墨格 2.0',\n    body:'這是一款<b>手寫字型產生器<\u002Fb>。你只要用滑鼠、觸控或手寫筆，把字一個一個寫下來，就能做出一套屬於自己的<span class=\"hl\">中文手寫字型<\u002Fspan>，安裝到電腦或手機使用。' },\n  { emoji:'✍️', title:'一格一格地寫',\n    body:'中央的格子裡會顯示目前要寫的字（淡淡的參考字），照著寫即可。<br>2.0 提供<span class=\"hl\">五種筆觸《毛筆・鋼筆・鉛筆・麥克筆・枯筆》<\u002Fspan>自由切換，支援<b>筆壓感應<\u002Fb>，可調筆畫粗細，寫錯能<span class=\"hl\">復原（Ctrl+Z）<\u002Fspan>。寫完一個字會<b>自動儲存<\u002Fb>，按方向鍵或「下一字」換字。' },\n  { emoji:'📦', title:'分包書寫，循序完成',\n    body:'左側把字分成一個個<span class=\"hl\">待寫包<\u002Fspan>：第一包是數字英文、第二包符號，之後預設<b>每 100 個漢字一包<\u002Fb>，寫完一包就能匯出產生你需要的字型。<br>可在側欄改成 <span class=\"hl\">50（初學推薦）<\u002Fspan>、100、200、300 或 500 字／包，最小 50 字；每包都有獨立進度，不必一次寫完。' },\n  { emoji:'👁️', title:'隨時預覽效果',\n    body:'寫到一段落，按頂部<span class=\"hl\">「👁 預覽字體」<\u002Fspan>，就能用你的手寫字即時打字試看實際效果，還沒寫的字會以系統字型顯示。' },\n  { emoji:'⬇️', title:'產生並安裝字型',\n    body:'按<span class=\"hl\">「⬇ 產生字型」<\u002Fspan>會同時輸出 <b>TTF<\u002Fb> 與 <b>OTF<\u002Fb> 兩種格式，下載後安裝即可在 Word、繪圖軟體等使用。可在「⚙ 設定」自訂字型名稱。' },\n  { emoji:'🧹', title:'清空已寫的字',\n    body:'頂部的<span class=\"hl\">「🧹 清空」<\u002Fspan>點下後可選擇：只清掉<b>「目前這一包」<\u002Fb>的字，或<b>「全部」<\u002Fb>已寫的字。<br>清空動作需確認、且<b>無法復原<\u002Fb>——清空前記得先按「💾 匯出」備份。' },\n  { emoji:'👁️', title:'試演：檢視與樣張',\n    body:'切到頂部<span class=\"hl\">「👁 試演」<\u002Fspan>分頁：可<b>同步目前手寫進度<\u002Fb>組成字型即時試打、載入<b>已匯出的 ttf / otf / woff<\u002Fb> 看完整樣張與字符表，也可把<b>備份 .json<\u002Fb> 丟進去檢視手寫字符，並輸出 PNG 樣張。' },\n  { emoji:'💾', title:'記得備份，以免遺失',\n    body:'所有筆跡都存在<b>你的瀏覽器本機<\u002Fb>，清除瀏覽器資料就會消失。<br>請常按頂部<span class=\"hl\">「💾 匯出」<\u002Fspan>存成 .json 檔；要還原時按<span class=\"hl\">「📥 匯入」<\u002Fspan>或把檔案<b>拖進視窗<\u002Fb>即可。寫滿 50 字也會提醒你備份。' },\n  { emoji:'🧹', title:'備份檔管理：舊檔可以刪',\n    body:'每份新備份都<b>已包含之前全部的字<\u002Fb>，舊檔留著只會佔空間。<br><br>但建議備份完成後，先<span class=\"hl\">實際測試輸出的 JSON 備份檔<\u002Fspan>（匯入還原確認可用），或<span class=\"hl\">實際匯出 TTF 檔案檢閱可以應用<\u002Fspan>，再行刪除舊的備份。<br><br>檔名含<b>字數與日期<\u002Fb>（如 MyHandwriting-1200字-20260703.json），留最新一份即可完整還原。' },\n  { emoji:'📱', title:'手機・平板用戶請特別注意',\n    body:'行動裝置的記憶體與儲存空間較小，備份檔累積或空間不足都可能導致產字型失敗。<br><br>⚠️ 請務必<span class=\"hl\">預留足夠的儲存空間<\u002Fspan>再進行創作與匯出<br>⚠️ 舊備份檔確認新檔可用後就刪除，別讓重複檔佔用空間<br>⚠️ 大字庫建議用<span class=\"hl\">「📦 只匯出目前這包」<\u002Fspan>分包備份，單檔更小更穩' },\n];\nlet guideIdx=0;\nfunction renderGuide(){\n  const s=GUIDE_STEPS[guideIdx];\n  $('#guideStage').innerHTML=\n    `<div class=\"guide-emoji\">${s.emoji}<\u002Fdiv>\n     <div class=\"guide-title\">${s.title}<\u002Fdiv>\n     <div class=\"guide-body\">${s.body}<\u002Fdiv>`;\n  const dots=$('#guideDots'); dots.innerHTML='';\n  GUIDE_STEPS.forEach((_,i)=>{ const d=document.createElement('i');\n    if(i===guideIdx)d.className='on'; dots.appendChild(d); });\n  $('#guidePrev').style.display = guideIdx>0 ? '' : 'none';\n  $('#guideNext').textContent = guideIdx===GUIDE_STEPS.length-1 ? '開始書寫 ✍️' : '下一步';\n  $('#guideSkip').style.display = guideIdx===GUIDE_STEPS.length-1 ? 'none' : '';\n}\nfunction openGuide(){ guideIdx=0; renderGuide(); $('#guideScrim').classList.add('show'); }\nfunction closeGuide(){ $('#guideScrim').classList.remove('show'); }\nfunction wireGuide(){\n  $('#guideNext').onclick=()=>{ if(guideIdx<GUIDE_STEPS.length-1){ guideIdx++; renderGuide(); } else closeGuide(); };\n  $('#guidePrev').onclick=()=>{ if(guideIdx>0){ guideIdx--; renderGuide(); } };\n  $('#guideSkip').onclick=closeGuide;\n  $('#helpBtn').onclick=openGuide;\n}\n\n// ---------- 2.0 首次啟用：字型設定（落款） ----------\nfunction sanitizeEn(v){ return v.replace(/[^A-Za-z0-9]/g,''); }\nfunction updateSetupPreview(){\n  const zh=($('#suZh').value.trim()||'我的手寫體').replace(/<\u002Fg,'&lt;');\n  const en=sanitizeEn($('#suEn').value)||'MyHandwriting';\n  $('#suPreview').innerHTML='<span class=\"spv-zh\">'+zh+'<\u002Fspan><span class=\"spv-en\">'+en+'.ttf<\u002Fspan>';\n}\nlet setupDevice=null;\nconst DEVICE_HINTS={\n  desktop:'以滑鼠或數位板書寫，字表側欄常駐，適合長時間創作。',\n  tablet:'建議搭配觸控筆書寫；進入後字表會先收合，爭取更大書寫空間。',\n  phone:'單手也能寫；字表以抽屜呈現，選完字自動收回。記得經常備份。'};\nfunction detectDevice(){ const w=window.innerWidth; return w>1150?'desktop':(w>780?'tablet':'phone'); }\nfunction refreshDevicePick(){\n  $$('#devicePick button').forEach(b=>b.classList.toggle('on',b.dataset.d===setupDevice));\n  $('#deviceHint').textContent=DEVICE_HINTS[setupDevice]||'';\n}\nfunction wireSetup(){\n  $$('#devicePick button').forEach(b=>b.onclick=()=>{ setupDevice=b.dataset.d; refreshDevicePick(); });\n  $('#suZh').oninput=updateSetupPreview;\n  $('#suEn').oninput=e=>{ const s=sanitizeEn(e.target.value); if(s!==e.target.value) e.target.value=s; updateSetupPreview(); };\n  [$('#suZh'),$('#suEn')].forEach(i=>i.addEventListener('keydown',e=>{ if(e.key==='Enter') $('#suGo').click(); }));\n  $('#suGo').onclick=async()=>{\n    state.settings.zhName=$('#suZh').value.trim()||'我的手寫體';\n    state.settings.enName=sanitizeEn($('#suEn').value)||'MyHandwriting';\n    state.settings.device=setupDevice||detectDevice();\n    await persistSettings();\n    try{ await idbPut(META,'setupDone',1); }catch(_){}\n    applySettings();\n    $('#setupScrim').classList.remove('show');\n    if(state.settings.device==='tablet' && !isMobile()) setSidebar(false);\n    openGuide();\n  };\n}\nasync function startEntry(){\n  let done=false;\n  try{ done=await idbGet(META,'setupDone'); }catch(_){}\n  if(done){ openGuide(); return; }\n  $('#suZh').value=state.settings.zhName||'我的手寫體';\n  $('#suEn').value=state.settings.enName||'MyHandwriting';\n  setupDevice=state.settings.device||detectDevice();\n  refreshDevicePick();\n  updateSetupPreview();\n  $('#setupScrim').classList.add('show');\n}\n\nasync function boot(){\n  let dbOK=true;\n  try{ await openDB(); }\n  catch(err){ console.error('IndexedDB unavailable',err); dbOK=false; }\n  if(dbOK){\n    try{\n      const saved=await idbGet(META,'settings');\n      if(saved) Object.assign(state.settings,saved);\n      if(state.settings.batchSize!=null) state.batchSize=Math.max(50,+state.settings.batchSize||100);\n      const keys=await idbKeys(STORE);\n      keys.forEach(k=>written.add(parseInt(k.slice(1),16)));\n      const bk=await idbGet(META,'backup');\n      if(bk&&bk.count){ backedUpCount=Math.min(bk.count,written.size); lastBackupTs=bk.ts||0; }\n    }catch(err){ console.error('DB read failed',err); dbOK=false; }\n  }\n  $('#batchSize').value=String(state.batchSize);\n  wireUI();\n  wireGuide();\n  wireSetup();\n  sizeCanvas();\n  applySettings();\n  // 還原桌機／平板的側欄收合偏好\n  try{ if(!isMobile() && localStorage.getItem('moge2_sidebar')==='0') setSidebar(false); }catch(_){}\n  loadTier('common');\n  startEntry();  // 首次：字型設定→導引；之後：直接導引\n  if(!dbOK){\n    setTimeout(()=>alert('⚠ 注意：你的瀏覽器無法使用本機儲存（可能是無痕／隱私模式，或瀏覽器設定限制）。\\n\\n你仍然可以寫字並產生字型，但「重新整理後字不會被保留」。請在關閉前務必按「⬇ 產生字型」或「💾 匯出」存檔。'),600);\n  }\n}\nboot().catch(err=>{\n  console.error('boot failed',err);\n  alert('初始化時發生問題，請重新整理頁面。若持續發生，請改用一般視窗（非無痕）的 Chrome / Edge / Safari 開啟。');\n});\n})();\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
